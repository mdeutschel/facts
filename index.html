      <h1>Fakten-Stammtisch</h1>
      <p>Faktenbasierte Argumente und Quellen zu politischen und gesellschaftlichen Themen in Deutschland.</p>
      <p>Alle Inhalte als Textdatei: <a href="https://fakten-stammtisch.de/llms-full.txt">fakten-stammtisch.de/llms-full.txt</a></p>
      <h2>Themen</h2>
      <h3><a href="https://fakten-stammtisch.de/thema/heizung">Heizungswechsel 2026</a></h3>
      <p>Wärmepumpe vs. Öl- &amp; Gasheizung | Zahlen · Fakten · Argumente</p>
      <ul>
        <li>21,7 Mio. Heizungen</li>
        <li>Drei Viertel heizen mit Gas oder Öl</li>
        <li>69,4 % WP im Neubau 2024</li>
        <li>9 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (9)</summary>
        <dl>
          <dt>Wärmepumpe lohnt sich nur im Neubau!</dt>
          <dd>Falsch. Fraunhofer ISE hat 77 Bestandsgebäude vermessen, darunter sehr alte Gebäude, und keinen Zusammenhang zwischen Baujahr und Effizienz gefunden. Entscheidend sind Heizkörpergröße, Hydraulik und saubere Auslegung. Fußbodenheizung ist nicht zwingend nötig. Außerdem gehen rund 80 % der neuen Wärmepumpen in Bestandsgebäude.</dd>
          <dt>Gas ist doch viel billiger!</dt>
          <dd>In der Anschaffung kann Gas zunächst günstiger wirken. Bei Betriebskosten, CO₂-Kosten und Infrastruktur-Risiken spricht aber vieles für die Wärmepumpe. Konkrete 20-Jahres-Summen sollte man nur nennen, wenn Gebäude, Effizienz, Energiepreise und Förderung transparent offengelegt sind.</dd>
          <dt>Das Gasnetz bleibt doch!</dt>
          <dd>MVV strebt in Mannheim die Stilllegung des Gasnetzes bis 2035 an. DIW warnt, dass Netzentgelte mit sinkender Kundenzahl stark steigen können. Die aktuelle VKU-Umfrage zeigt außerdem, dass viele Stadtwerke vor allem mit Wärmepumpen und Fernwärme planen.</dd>
          <dt>Wasserstoff wird alles lösen!</dt>
          <dd>Die aktuelle VKU-Umfrage sieht grüne Gase nur bei 5 % der befragten Unternehmen als Hauptlösung. MVV hält Biomethan wegen fehlender Mengen und Wasserstoff aus Kostengründen für Privathaushalte nicht für tragfähig.</dd>
          <dt>Heizungsgesetz ist doch abgeschafft!</dt>
          <dd>Über die Reform der Heizungsregeln wird 2026 politisch verhandelt. Belastbar ist vor allem: Der nationale CO₂-Preis endet 2026 im Korridor, ab 2027 startet ETS 2, und neue fossile Investitionen bleiben preis- und infrastrukturnah riskant.</dd>
          <dt>Meine Heizung funktioniert doch noch!</dt>
          <dd>Viele Heizungen im Bestand sind alt: Laut BDH und ZVSHK ist über die Hälfte der 21,7 Mio. Heizungen veraltet, mehr als 4 Mio. sind über 30 Jahre alt. Wer früh tauscht, kann aktuelle Förderboni eher noch nutzen.</dd>
          <dt>Die Wärmepumpe ist doch viel zu laut!</dt>
          <dd>Luftwärmepumpen müssen sorgfältig geplant werden. Typische Geräuschangaben liegen oft bei etwa 40–50 dB; Aufstellort, Abstand und Nachtmodus sind entscheidend. In reinen Wohngebieten gilt nachts regelmäßig ein Immissionsrichtwert von 35 dB(A) nach TA Lärm.</dd>
          <dt>Das Stromnetz bricht doch zusammen!</dt>
          <dd>Wärmepumpen erhöhen den Strombedarf, aber Netzfragen sind vor allem lokal und hängen stark von Steuerung und Ausbauplanung ab. Entscheidend ist, dass Wärmepumpen sinnvoll ins Verteilnetz integriert und möglichst flexibel betrieben werden.</dd>
          <dt>Bei richtigem Frost funktioniert die WP nicht!</dt>
          <dd>Praxisdaten zeigen, dass Wärmepumpen auch in Bestandsgebäuden effizient laufen. Zudem kommen in Norwegen 632 installierte Wärmepumpen auf 1.000 Haushalte. Entscheidend sind gute Auslegung und passende Heizflächen, nicht pauschale Frost-Mythen.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/emobilitaet">E-Mobilität</a></h3>
      <p>Fakten zu Reichweite, Akkus, Kosten &amp; Klimabilanz</p>
      <ul>
        <li>2,03 Mio. BEV in Deutschland</li>
        <li>19,1 % BEV-Marktanteil (2025)</li>
        <li>7 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (7)</summary>
        <dl>
          <dt>Nach 3 bis 5 Jahren ist der Akku kaputt und ein neuer kostet 15.000 Euro.</dt>
          <dd>Das ist so pauschal falsch. Moderne Traktionsbatterien sind auf lange Nutzung ausgelegt, Hersteller geben mehrjährige Garantien, und die Batterie ist normalerweise nicht schon nach wenigen Jahren am Ende. Entscheidend sind Fahrzeugmodell, Nutzung und Batterietyp.</dd>
          <dt>Wenn alle abends ihr E-Auto anstecken, bricht das Stromnetz zusammen.</dt>
          <dd>Nein. Netzbetreiber dürfen neue steuerbare Ladeeinrichtungen nicht pauschal wegen lokaler Engpässe ablehnen. Im Engpassfall darf der Strombezug nach § 14a EnWG vorübergehend auf 4,2 kW reduziert werden; diese Mindestleistung muss laut Bundesnetzagentur immer verfügbar bleiben.</dd>
          <dt>Wegen der Batterieproduktion ist ein E-Auto klimaschädlicher als ein Diesel.</dt>
          <dd>Falsch. Laut ICCT verursachen 2025 in Europa verkaufte Batterie-Elektroautos über ihren Lebenszyklus rund 73 % weniger Treibhausgasemissionen als vergleichbare Benziner. Der höhere CO₂-Fußabdruck der Produktion wird im Fahrbetrieb wieder ausgeglichen.</dd>
          <dt>Für E-Autos schuften Kinder im Kongo für Kobalt.</dt>
          <dd>Die Probleme im Rohstoffabbau sind real und müssen ernst genommen werden. Gleichzeitig sinkt der Einsatz kritischer Materialien bei manchen Batterietypen, LFP-Akkus kommen ohne Kobalt und Nickel aus, und die EU verschärft die Recyclingvorgaben für Batterierohstoffe deutlich.</dd>
          <dt>Batterien sind nur eine Brückentechnologie, Wasserstoff und E-Fuels sind die Zukunft.</dt>
          <dd>Die Physik spricht eher für direkte Elektrifizierung. Im Pkw ist das Batterieauto deutlich effizienter als Wasserstoff oder E-Fuels. Diese Energieträger werden vor allem dort gebraucht, wo Batterien an Grenzen stoßen, etwa in Luftfahrt, Schifffahrt oder Teilen der Industrie.</dd>
          <dt>E-Autos brennen ständig und können nicht gelöscht werden.</dt>
          <dd>Die pauschale Behauptung stimmt nicht. Laut BMUKN brennen Elektroautos nicht häufiger als andere Fahrzeuge. Wenn ein Akku-Brand entsteht, ist das Löschen zwar aufwendiger, aber für Feuerwehren ist das ein bekanntes und beherrschbares Szenario.</dd>
          <dt>Mit dem E-Auto komme ich nicht in den Urlaub nach Italien.</dt>
          <dd>Auch längere Urlaubsfahrten sind mit E-Autos heute praktikabel. Das Schnellladenetz wächst weiter, und auf Langstrecken gehören Ladepausen ähnlich wie Tank- oder Ruhepausen ohnehin zur Reiseplanung dazu.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/energiewende">Energiewende &amp; Atomkraft</a></h3>
      <p>Fakten zu Erneuerbaren, AKW-Neubau &amp; Versorgungssicherheit</p>
      <ul>
        <li>55,3 % Erneuerbare im Strommix (2025)</li>
        <li>AKW-Neubau deutlich teurer als Wind/Solar</li>
        <li>7 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (7)</summary>
        <dl>
          <dt>Zeig mir das AKW, das du bauen willst.</dt>
          <dd>55 Mrd. EUR für Hinkley Point C, 15–20 Jahre Bauzeit. In Deutschland: kein Fachpersonal, keine Lieferketten, keine Genehmigungsstrukturen. Neue AKW sind das Gegenteil von „realistisch“. Bei Baubeschluss heute: erster Strom frühestens ~2040.</dd>
          <dt>AKW ersetzen keinen einzigen Schritt der Energiewende.</dt>
          <dd>Selbst alle 17 alten AKW deckten bei verdoppeltem Strombedarf nur ~10%. Netze, Speicher, Windräder braucht man so oder so. Kernkraft ist bestenfalls Ergänzung, kein Alternativpfad.</dd>
          <dt>Die Krise war Gas, nicht Strom.</dt>
          <dd>Der Großteil des Erdgases ging 2022 in Wärme und Industrie, nicht in Strom. AKW hätten die Gaskrise deshalb strukturell nicht gelöst. Auch bei Uran ist Kernenergie zudem auf internationale Lieferketten angewiesen.</dd>
          <dt>Das Problem heißt Bürokratie, nicht Technologie.</dt>
          <dd>400 GW beantragte Speicherleistung zeigen: Der Markt will. Der Engpass sind Netzanschlüsse, Genehmigungsverfahren und Abstandsregeln. Das ist politisches Versagen aller Parteien – kein Versagen der Erneuerbaren.</dd>
          <dt>Aber SMRs lösen doch das Problem!</dt>
          <dd>Es gibt keinen einzigen kommerziellen SMR im Westen. Das am weitesten fortgeschrittene Projekt (Darlington, Kanada) produziert Strom für ~15 Ct/kWh – doppelt so teuer wie Wind/Solar. Das einzige US-Projekt (NuScale) wurde 2023 eingestellt. Frühestmögliche Inbetriebnahme: ~2030.</dd>
          <dt>Atomkraft ist doch abgeschaltet und erledigt!</dt>
          <dd>Über 1.200 Castor-Behälter stehen aktuell in Zwischenlagern. Die Endlagersuche dauert mindestens bis 2050, die Entsorgungskosten liegen bereits in zweistelliger Milliardenhöhe. Neue AKWs würden das Problem weiter vergrößern, nicht verkleinern.</dd>
          <dt>Deutschland muss sich doch selbst versorgen können!</dt>
          <dd>Der europäische Stromverbund existiert genau dafür. 2025 importierte DE 76 TWh und exportierte 54 TWh. Skandinavische Wasserkraft kompensiert Dunkelflauten, deutscher Solarüberschuss fließt in Nachbarländer. Das ist kein Versagen, sondern intelligentes Design – und billiger als Autarkie.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/klimawandel">Klimawandel</a></h3>
      <p>Fakten zu Temperatur, Extremwetter, Emissionen &amp; Kippelemente</p>
      <ul>
        <li>2024: Erstmals +1,6 °C über vorindustriellem Niveau</li>
        <li>CO₂-Konzentration 2024: 422,1 ppm</li>
        <li>9 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (9)</summary>
        <dl>
          <dt>Das Klima hat sich schon immer verändert!</dt>
          <dd>Stimmt — aber der aktuelle CO₂-Anstieg ist 100-mal schneller als bei natürlichen Zyklen. Nach der letzten Eiszeit stieg CO₂ über 10.000 Jahre um ~80 ppm. Wir haben in nur 150 Jahren +147 ppm draufgelegt. Die Geschwindigkeit ist das Problem: Ökosysteme können sich nicht schnell genug anpassen. (Quelle: NASA, MIT Climate Portal)</dd>
          <dt>Deutschland allein kann das Klima nicht retten!</dt>
          <dd>Deutschland gehört historisch zu den großen Emittenten und liegt pro Kopf weiter über dem Weltmittel. Wenn jedes Land auf andere zeigt, passiert gar nichts. Zudem schafft Klimaschutz Märkte und Arbeitsplätze etwa bei Erneuerbaren, Wärmepumpen oder E-Mobilität.</dd>
          <dt>Klimaschutz kostet Arbeitsplätze!</dt>
          <dd>Das Gegenteil ist der Fall: Weltweit arbeiten bereits 16,6 Mio. Menschen in der Erneuerbaren-Branche (IRENA 2024). In Deutschland hat sich die Zahl der Stellenausschreibungen in der Energiewende von 173.000 (2019) auf 372.500 (2024) mehr als verdoppelt. Die Branche sucht ~300.000 Fachkräfte. Im Gegensatz dazu: Die Kohleindustrie beschäftigte zuletzt nur noch ~20.000 Menschen. (Quellen: IRENA 2025, BEE 2025, BMWK 2024)</dd>
          <dt>Die Wissenschaftler sind sich doch gar nicht einig!</dt>
          <dd>Doch — zu über 99 %. Eine Metastudie von 2021 wertete 88.125 Fachpublikationen aus; praktisch alle bestätigen den menschengemachten Klimawandel. Der IPCC AR6 (2023) stuft den menschlichen Einfluss als 'eindeutig' ein.</dd>
          <dt>Es ist doch gar nicht wärmer geworden — letzter Winter war kalt!</dt>
          <dd>Wetter ≠ Klima. Ein kalter Winter in Deutschland ändert nichts am globalen Trend: 2024 war das wärmste Jahr seit Beginn der Aufzeichnungen (+1,6 °C über vorindustriellem Niveau). Die letzten zehn Jahre waren das wärmste Jahrzehnt ever. 11 von 12 Monaten in 2024 lagen über der 1,5-°C-Schwelle. Einzelne Kälteereignisse entstehen oft gerade durch Klimawandel — z. B. durch gestörte Jetstreams. (Quelle: Copernicus C3S 2025)</dd>
          <dt>CO₂ ist doch gut für Pflanzen!</dt>
          <dd>Im Gewächshaus unter Idealbedingungen stimmt das — aber die Erde ist kein Gewächshaus. In der realen Welt überwiegen die negativen Effekte: Hitzestress, Dürren, Starkregen und Nährstoffmangel reduzieren Ernteerträge. Freilandexperimente (FACE-Studien) zeigen 50 % geringere Erträge als Laborversuche. Eine Stanford-Studie zeigt: Ab 2050 überwiegt der Schaden durch Hitze den CO₂-Düngeeffekt komplett. Außerdem: Mehr CO₂ fördert vor allem Unkräuter, nicht Nutzpflanzen. (Quellen: Yale Climate Connections 2020, Skeptical Science)</dd>
          <dt>China und Indien sind doch viel schlimmer!</dt>
          <dd>China emittiert absolut am meisten — aber pro Kopf liegt China bei ~8 t, Deutschland bei ~7 t und Indien bei nur ~2 t (globaler Schnitt: 4,9 t). Historisch kumuliert hat der Westen das Problem verursacht: USA 24 %, Europa ~22 %, China 14 % der historischen Emissionen. Außerdem produziert China viele Waren für westliche Konsumenten — diese Emissionen müsste man eigentlich uns zurechnen. Und: China installiert mehr Erneuerbare als alle anderen Länder zusammen. (Quellen: Our World in Data 2023, IEA 2023)</dd>
          <dt>Vulkane stoßen mehr CO₂ aus als Menschen!</dt>
          <dd>Falsch — und zwar deutlich. Laut NOAA emittieren Menschen mindestens rund 60-mal mehr CO₂ als alle Vulkane zusammen. Der Vulkanvergleich ist deshalb kein ernsthaftes Gegenargument zur menschengemachten Erwärmung.</dd>
          <dt>Klimaschutz können wir uns nicht leisten!</dt>
          <dd>Nichtstun ist wirtschaftlich deutlich teurer: Laut PIK drohen bis 2050 jährliche Klimaschäden in der Größenordnung von 38 Billionen USD. BCG veranschlagt die Kosten wirksamen Klimaschutzes deutlich niedriger als die Verluste bei ungebremster Erwärmung. Prävention ist daher ökonomisch sinnvoller als spätes Reagieren.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/verkehrswende">Verkehrswende</a></h3>
      <p>Fakten zu Mobilität, Flächengerechtigkeit, Radverkehr und Klimazielen</p>
      <ul>
        <li>23 Std./Tag steht ein Auto ungenutzt</li>
        <li>58 % der Berliner Verkehrsfläche für MIV</li>
        <li>11,2 % Radverkehrsanteil (MiD 2023)</li>
        <li>12 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (12)</summary>
        <dl>
          <dt>E-Autos sind doch gar nicht umweltfreundlicher, wenn der Strom aus Kohle kommt!</dt>
          <dd>Selbst beim aktuellen deutschen Strommix ist ein E-Auto über seinen Lebenszyklus deutlich klimafreundlicher als ein Verbrenner. Der Erneuerbare-Anteil lag 2025 bei über 55 %. Der hohe Wirkungsgrad des E-Motors (70–80 %) schlägt die ineffiziente Verbrennung (ca. 20–30 %) bei weitem. Und mit jedem Windrad und Solarpanel wird das E-Auto sauberer — ein Verbrenner nie.</dd>
          <dt>Wir sollten einfach E-Fuels tanken, dann können wir unsere Verbrenner behalten.</dt>
          <dd>E-Fuels sind extrem ineffizient: Für die gleiche Strecke braucht ein damit betriebener Verbrenner 5- bis 7-mal so viel erneuerbaren Strom wie ein E-Auto. E-Fuels werden dringend für Flugzeuge und Schiffe gebraucht, wo Batterien zu schwer sind. Sie für PKW einzusetzen wäre massive Energieverschwendung.</dd>
          <dt>Das Deutschlandticket ist ein Milliardengrab und bringt niemanden dazu, das Auto stehen zu lassen.</dt>
          <dd>Mit rund 14,6 Millionen Nutzern Ende 2025 ist das Ticket ein großer Erfolg. Nach der Preiserhöhung 2026 lag die Kündigungsquote bei 5,75 %, nach der Preiserhöhung 2025 laut VDV aber bei rund 8 %. Das Ticket vereinfacht den Tarifdschungel massiv und entlastet viele Pendler trotzdem deutlich.</dd>
          <dt>Die Reichweite von E-Autos ist viel zu gering für den Alltag.</dt>
          <dd>Die durchschnittliche tägliche Fahrstrecke in Deutschland liegt bei unter 40 Kilometern. Moderne E-Autos bieten reale Reichweiten von 300 bis 500 Kilometern, was für über 95 % aller Alltagsfahrten völlig ausreicht. Zudem wächst das Schnellladenetz kontinuierlich — über 150.000 öffentliche Ladepunkte gab es Ende 2025.</dd>
          <dt>Das Stromnetz bricht zusammen, wenn alle elektrisch fahren.</dt>
          <dd>Studien zeigen, dass selbst bei 15 Millionen E-Autos der Strombedarf nur um etwa 9–10 % des heutigen Verbrauchs steigen würde. Das deutsche Stromnetz kann das bewältigen, besonders durch intelligentes Laden (z. B. nachts, wenn viel Windstrom im Netz ist). Nie mehr als 10 % aller PKW sind gleichzeitig unterwegs — sie laden also auch nicht alle gleichzeitig.</dd>
          <dt>Auf dem Land gibt es keine Ladesäulen, E-Autos funktionieren nur in der Stadt!</dt>
          <dd>Deutschland hatte Ende 2025 deutlich über 150.000 öffentliche Ladepunkte. Die Abdeckung verbessert sich kontinuierlich, gerade entlang von Autobahnen. Außerdem finden viele Ladevorgänge zu Hause oder am Arbeitsplatz statt — die öffentliche Ladesäule ist nicht der einzige Standardfall.</dd>
          <dt>Autofreie Innenstädte töten den Einzelhandel!</dt>
          <dd>Studien aus ganz Europa zeigen das Gegenteil: Fußgänger und Radfahrer geben in Innenstädten mehr Geld pro Besuch aus als Autofahrer. Autofreie Zonen steigern die Aufenthaltsqualität, erhöhen die Besucherzahlen und stärken den lokalen Handel. Beispiele wie die Superblocks in Barcelona oder autoarme Zonen in Utrecht belegen: Weniger Autos bedeuten mehr Leben und mehr Umsatz.</dd>
          <dt>Radwege sind Geldverschwendung — die nutzt doch kaum jemand!</dt>
          <dd>Der Radverkehrsanteil steigt dort, wo gute Infrastruktur gebaut wird — die Nachfrage folgt dem Angebot. In Oldenburg liegt der Radanteil bei 47 %, in den Niederlanden bei 27 %. Deutschland investiert pro Kopf und Jahr nur einen Bruchteil dessen, was die Niederlande ausgeben. Ein Kilometer Radweg kostet etwa 1–2 Millionen Euro, ein Kilometer Autobahn 10–30 Millionen.</dd>
          <dt>Tempo 30 in der Stadt ist völlig übertrieben und bringt nichts.</dt>
          <dd>Tempo 30 senkt die Unfallschwere drastisch: Bei 30 km/h liegt das Todesfallrisiko für Fußgänger bei ca. 10 %, bei 50 km/h bei ca. 40 %. Zudem reduziert Tempo 30 den Straßenlärm deutlich — laut UBA die Hauptquelle von Lärmbelästigung in Deutschland. 30 Prozent aller Verkehrstoten sterben wegen überhöhter Geschwindigkeit. Tempo 30 macht Städte sicherer, leiser und lebenswerter.</dd>
          <dt>Deutschland ist ein Autoland — ohne Auto kommst du nicht zur Arbeit!</dt>
          <dd>In Großstädten besitzen rund 40 % der Haushalte kein Auto und kommen trotzdem zur Arbeit. Das Problem ist nicht, dass Menschen das Auto lieben, sondern dass Alternativen oft fehlen — besonders auf dem Land. Mit besserem ÖPNV-Takt, Rufbussen und sicheren Radwegen wird echte Wahlfreiheit möglich.</dd>
          <dt>SUVs sind sicherer für meine Familie, deshalb brauche ich einen.</dt>
          <dd>SUVs mögen für die Insassen etwas sicherer sein, aber sie erhöhen das Risiko für alle anderen Verkehrsteilnehmer massiv — besonders für Kinder und Fußgänger. Die höhere Motorhaube trifft bei einem Aufprall den Oberkörper statt der Beine. Gleichzeitig brauchen SUVs mehr Parkfläche und verursachen durch ihr höheres Gewicht mehr Reifenabrieb und Feinstaub. Echte Sicherheit entsteht durch Tempo 30, gute Radwege und Vision Zero — nicht durch Aufrüstung.</dd>
          <dt>Verkehrswende ist doch nur ein Großstadtthema — auf dem Land braucht man das Auto!</dt>
          <dd>Gerade auf dem Land braucht es die Verkehrswende am dringendsten: Die Abhängigkeit vom Auto ist dort am größten und trifft besonders jene, die sich kein Auto leisten können — Jugendliche, Ältere, Menschen mit niedrigem Einkommen. Lösungen wie Rufbusse, bessere Bahntaktung, sichere Radwege und E-Bike-Förderung können echte Wahlfreiheit schaffen. In vielen ländlichen Regionen fährt der Bus nur alle 2 Stunden — das ist kein Argument gegen die Verkehrswende, sondern dafür.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/buergergeld">Bürgergeld</a></h3>
      <p>Fakten zu Regelsätzen, Sanktionen und Lohnabstand</p>
      <ul>
        <li>563 € Regelsatz (Nullrunde 2025/2026)</li>
        <li>557 € Einkommensvorteil bei Mindestlohn (Single)</li>
        <li>6 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (6)</summary>
        <dl>
          <dt>Wer arbeitet, ist doch der Dumme. Mit Bürgergeld hat man am Ende mehr in der Tasche!</dt>
          <dd>Das stimmt nicht. Das Lohnabstandsgebot ist gewahrt. Eine WSI-Studie zeigt, dass ein Single, der Vollzeit zum Mindestlohn arbeitet, im Schnitt 557 Euro mehr im Monat zur Verfügung hat als jemand, der Bürgergeld bezieht. Bei Familien ist der Abstand oft noch größer, da Erwerbstätige zusätzlich Anspruch auf Kinderzuschlag und Wohngeld haben.</dd>
          <dt>Das Bürgergeld ist eine soziale Hängematte. Man muss gar nichts mehr machen und bekommt trotzdem Geld.</dt>
          <dd>Das Bürgergeld ist an Pflichten geknüpft. Wer Termine beim Jobcenter unentschuldigt versäumt oder zumutbare Arbeit ablehnt, muss mit Leistungsminderungen rechnen. Bei wiederholter Verweigerung einer tatsächlich und unmittelbar möglichen zumutbaren Arbeit kann seit Ende März 2024 unter engen gesetzlichen Voraussetzungen sogar der Regelbedarf für bis zu zwei Monate vollständig entfallen.</dd>
          <dt>Die Bürgergeld-Empfänger bekommen jedes Jahr massiv mehr Geld, während die Löhne stagnieren!</dt>
          <dd>Die Regelsätze werden nach einem gesetzlichen Mechanismus an Preis- und Lohnentwicklung angepasst. Für 2025 und 2026 blieben die Regelbedarfe unverändert, weil die Fortschreibung rechnerisch niedrigere Werte ergeben hätte und die Besitzschutzregelung griff. Der Regelbedarf für Singles bleibt deshalb bei 563 Euro.</dd>
          <dt>Das System wird doch nur ausgenutzt. Fast alle betrügen beim Bürgergeld!</dt>
          <dd>Leistungsmissbrauch existiert und muss konsequent verfolgt werden. Für pauschale Behauptungen über massenhaften Betrug liefern öffentlich zugängliche amtliche Daten aber keinen belastbaren Beleg. Jobcenter prüfen Anträge, gleichen Daten ab und können bei Verdacht Leistungen zurückfordern oder Strafverfahren anstoßen.</dd>
          <dt>Das Bürgergeld lockt nur Ausländer an, die sich hier auf unsere Kosten ein schönes Leben machen.</dt>
          <dd>Bürgergeld ist die Grundsicherung für Arbeitsuchende, kein bedingungsloses Einkommen. EU-Ausländer sind in den ersten Monaten ihres Aufenthalts oder bei einem Aufenthaltsrecht allein zur Arbeitsuche in der Regel vom Bürgergeld ausgeschlossen; es gibt aber Ausnahmen, etwa für Arbeitnehmer oder Personen mit fortwirkendem Arbeitnehmerstatus. Asylbewerber erhalten Leistungen nach dem Asylbewerberleistungsgesetz, deren Bedarfssätze unter dem Bürgergeld liegen. Wer Bürgergeld bezieht, muss dem Arbeitsmarkt grundsätzlich zur Verfügung stehen und an vereinbarten Mitwirkungs- oder Qualifizierungsmaßnahmen teilnehmen.</dd>
          <dt>Ukraine-Flüchtlinge bekommen sofort Bürgergeld, ohne jemals eingezahlt zu haben!</dt>
          <dd>Ukrainische Geflüchtete können seit dem 1. Juni 2022 bei Hilfebedürftigkeit Leistungen der Grundsicherung nach dem SGB II beziehungsweise der Sozialhilfe erhalten statt Leistungen nach dem Asylbewerberleistungsgesetz. Dadurch sind für sie Jobcenter beziehungsweise Sozialämter zuständig, einschließlich des Zugangs zu Integrations- und Sprachkursen sowie zur Arbeitsvermittlung. Die Grundsicherung ist steuerfinanziert und keine beitragsfinanzierte Versicherungsleistung.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/migration">Migration &amp; Asyl</a></h3>
      <p>Fakten zu Einwanderung, Flucht und Arbeitsmarkt in Deutschland</p>
      <ul>
        <li>Rückgang der Asylanträge um 50,7 % (2025)</li>
        <li>64 % Beschäftigungsquote bei 2015 zugezogenen Geflüchteten</li>
        <li>7 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (7)</summary>
        <dl>
          <dt>Die Asylzahlen explodieren immer weiter, wir werden überrannt!</dt>
          <dd>Tatsächlich sind die Asylerstanträge 2025 massiv gesunken. Mit 113.236 Erstanträgen gab es einen Rückgang von über 50 % im Vergleich zum Vorjahr (2024: 229.751). Im Januar 2026 setzte sich dieser Trend mit einem weiteren Rückgang von fast 49 % zum Vorjahresmonat fort.</dd>
          <dt>Die Flüchtlinge von 2015 leben alle nur vom Bürgergeld und arbeiten nicht.</dt>
          <dd>Ende 2024, also neun Jahre nach dem Zuzug, lag die Beschäftigungsquote der 2015 zugezogenen Geflüchteten laut IAB bei 64 % und näherte sich damit dem Bevölkerungsdurchschnitt an. Rund die Hälfte der beschäftigten Geflüchteten übt inzwischen eine qualifizierte Tätigkeit als Fachkraft oder Spezialist aus.</dd>
          <dt>Ausländer nehmen uns die guten Jobs weg.</dt>
          <dd>Die hier hinterlegte IAB-Quelle zeigt vor allem: Geflüchtete arbeiten häufig in Engpass- und systemrelevanten Berufen. Pauschale Aussagen über 'weggenommene gute Jobs' werden dadurch nicht gestützt.</dd>
          <dt>Die Zuwanderung bringt uns wirtschaftlich nichts, sie kostet nur.</dt>
          <dd>Zuwanderung verursacht anfangs Integrationskosten, kann wirtschaftlich aber relevant werden, wenn Menschen dauerhaft in Arbeit kommen. Die hier hinterlegte IAB-Quelle zeigt genau das für die 2015 zugezogenen Geflüchteten: Die Beschäftigungsquote steigt über die Jahre deutlich an.</dd>
          <dt>Die meisten Geflüchteten sind ungebildet und können hier gar nicht arbeiten.</dt>
          <dd>Zwar dauern Spracherwerb und Nachqualifizierung ihre Zeit, aber Daten des IAB zeigen: 7-8 Jahre nach dem Zuzug arbeiten rund 50 % der beschäftigten Geflüchteten als Fachkräfte oder Spezialisten. Die Integration in den Arbeitsmarkt verläuft stetig, braucht aber anfangs Investitionen in Bildung und Sprache.</dd>
          <dt>Ausländer sind krimineller als Deutsche, das zeigt doch die Kriminalstatistik!</dt>
          <dd>Mit den in dieser Datei hinterlegten Quellen lässt sich diese pauschale Behauptung nicht seriös belegen. Für Aussagen über Kriminalität bräuchte es eine eigene, sauber hinterlegte Quellenbasis mit differenzierten PKS- und Dunkelfelddaten.</dd>
          <dt>Migration kostet uns nur Milliarden und bringt wirtschaftlich nichts!</dt>
          <dd>Integration kostet anfangs tatsächlich Geld, etwa für Sprache, Unterbringung und Qualifizierung. Langfristig kann sie sich auszahlen: Ende 2024 lag die Beschäftigungsquote der 2015 zugezogenen Geflüchteten laut IAB bei 64 % (Männer: 76 %, Frauen: 35 %). Für weitergehende Aussagen zur gesamtwirtschaftlichen Wirkung braucht es aber zusätzliche, sauber hinterlegte Quellen.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/teilzeit">Teilzeit &amp; Arbeitsmoral</a></h3>
      <p>Arbeiten wir immer weniger? Fakten zu Arbeitsvolumen, Care-Arbeit und der Gen Z.</p>
      <ul>
        <li>61,26 Mrd. Stunden Gesamtarbeitsvolumen (2025)</li>
        <li>39,9 % Teilzeitquote (Rekordhoch)</li>
        <li>5 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (5)</summary>
        <dl>
          <dt>Die Leute wollen heute alle nur noch in Teilzeit arbeiten und ihre Freizeit genießen.</dt>
          <dd>Der Wunsch nach mehr Freizeit ist zwar der häufigste Grund (27,9 %), aber fast genauso viele (23,5 %) arbeiten in Teilzeit, weil sie Care-Arbeit leisten (Kinderbetreuung oder Pflege von Angehörigen). Bei Frauen liegen eigener Wunsch (28,9 %) und Care-Arbeit (28,8 %) nahezu gleichauf.</dd>
          <dt>Wegen der ganzen Teilzeit geht in Deutschland die Arbeitsleistung zurück.</dt>
          <dd>2025 lag das Gesamtarbeitsvolumen in Deutschland bei 61,26 Milliarden Stunden und damit nur minimal (-0,2 %) unter dem Vorjahr. Die Zahl der Erwerbstätigen blieb mit 45,98 Millionen nahezu konstant.</dd>
          <dt>Die Gen Z ist arbeitsscheu und will nicht mehr richtig arbeiten.</dt>
          <dd>Daten des IAB widerlegen das: Die Erwerbsbeteiligung der 20- bis 24-Jährigen ist seit 2015 um über 6 Prozentpunkte auf 76 % gestiegen. Die junge Generation ist so stark in den Arbeitsmarkt integriert wie lange nicht mehr.</dd>
          <dt>Die jungen Leute machen alle nur noch Teilzeit, weil sie keine Lust auf 40 Stunden haben.</dt>
          <dd>Der Anstieg der Teilzeit bei jungen Menschen hängt laut IAB zu großen Teilen mit mehr erwerbstätigen Studierenden zusammen. Die Erwerbsquote von Studierenden im Alter von 20 bis 24 Jahren stieg zwischen 2015 und 2023 um 19,3 Prozentpunkte auf 56,0 %.</dd>
          <dt>Wenn wir die Teilzeit abschaffen, haben wir keinen Fachkräftemangel mehr.</dt>
          <dd>Das ist ein Trugschluss. Die verfügbaren Destatis-Daten zeigen vor allem, dass Teilzeit häufig mit Betreuungspflichten (23,5 %), Aus- und Weiterbildung (11,6 %) oder Krankheit beziehungsweise Behinderung (4,9 %) zusammenhängt. Ein pauschales 'Teilzeit abschaffen' beseitigt diese Gründe nicht.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/vegane-ernaehrung">Vegane Ernährung &amp; Fleischkonsum</a></h3>
      <p>Auswirkungen auf Klima, Umwelt und Gesundheit</p>
      <ul>
        <li>Weniger tierische Produkte senken Emissionen deutlich</li>
        <li>Mehr als 75 % der globalen Agrarfläche könnten frei werden</li>
        <li>6 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (6)</summary>
        <dl>
          <dt>Für das Soja im Tofu der Veganer wird der Regenwald abgeholzt!</dt>
          <dd>Das ist ein Mythos. Rund 77 % der weltweiten Sojaernte gehen ins Tierfutter. Nur ein kleiner Teil wird direkt für Lebensmittel wie Tofu oder Sojamilch genutzt. Viele Hersteller für den deutschen Markt beziehen ihr Soja aus der EU, teils auch aus Nordamerika und China. Wer den Regenwald schützen will, sollte deshalb vor allem weniger Tierfutter-Soja nachfragen.</dd>
          <dt>Veganer haben doch alle Nährstoffmangel, besonders bei Protein und Vitamin B12.</dt>
          <dd>Bei ausreichender Energiezufuhr und geeigneter Kombination pflanzlicher Proteinquellen kann der Proteinbedarf gedeckt werden. Vitamin B12 muss bei veganer Ernährung tatsächlich supplementiert werden. Genau deshalb ist eine gut geplante vegane Ernährung wichtig.</dd>
          <dt>Der Mensch ist ein Allesfresser, wir haben schon immer Fleisch gegessen.</dt>
          <dd>Dass wir Fleisch essen können, bedeutet nicht, dass wir es in heutigen Mengen brauchen. Der Fleischverzehr in Deutschland lag 2024 bei 53,2 kg pro Kopf. Ein hoher Konsum tierischer Produkte wird mit gesundheitlichen Risiken wie Herz-Kreislauf-Erkrankungen und bestimmten Krebsarten in Verbindung gebracht.</dd>
          <dt>Pflanzenmilch wie Mandelmilch verbraucht doch auch extrem viel Wasser!</dt>
          <dd>Es stimmt, dass Mandeln relativ viel Wasser benötigen. Das macht Pflanzenmilch insgesamt aber nicht automatisch so ressourcenintensiv wie tierische Produkte. Wer Wasser- und Klimabilanz verbessern will, kann auf besonders günstige pflanzliche Alternativen wie Hafer setzen.</dd>
          <dt>Veganismus ist nur ein teurer Lifestyle für privilegierte Großstädter.</dt>
          <dd>Vegane Grundnahrungsmittel wie Reis, Kartoffeln, Nudeln, Linsen, Bohnen, Haferflocken und saisonales Gemüse gehören zu den günstigsten Lebensmitteln überhaupt. Teuer sind vor allem hochverarbeitete Ersatzprodukte, die für eine ausgewogene pflanzliche Ernährung nicht zwingend nötig sind.</dd>
          <dt>Wenn alle vegan werden, verlieren unsere Landwirte ihre Existenz!</dt>
          <dd>Ein Wandel der Ernährungsgewohnheiten passiert nicht über Nacht, sondern über Jahre und Jahrzehnte. Das gibt der Landwirtschaft Zeit, sich anzupassen. Der Anbau pflanzlicher Proteine für den direkten menschlichen Verzehr kann neue Marktchancen schaffen.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/vermoegenssteuer">Vermögens- und Erbschaftssteuer</a></h3>
      <p>Verteilung von Reichtum und Besteuerung von großen Vermögen in Deutschland</p>
      <ul>
        <li>Das reichste 1 % besitzt mindestens 26 % des Vermögens</li>
        <li>Nur rund 1 % BIP vermögensbezogene Steuern (OECD: 1,9 %)</li>
        <li>11 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (11)</summary>
        <dl>
          <dt>Wir sind sowieso schon Hochsteuerland, eine Vermögenssteuer macht uns kaputt!</dt>
          <dd>Bei Steuern und Abgaben auf Arbeit liegt Deutschland hoch. Bei den vermögensbezogenen Steuern liegt Deutschland mit rund 1 % des BIP dagegen klar unter dem OECD-Durchschnitt von 1,9 %. Viele internationale Vergleiche zeigen: Eine stärkere Besteuerung großer Vermögen kann helfen, Arbeitseinkommen im Gegenzug weniger stark zu belasten.</dd>
          <dt>Das ist doch reine Neidsteuer! Typisch deutsche Neidgesellschaft!</dt>
          <dd>Es geht nicht um Neid, sondern um Chancengerechtigkeit. Ein großer Teil sehr großer Vermögen wird geerbt, nicht neu aufgebaut. Wenn Vermögenskonzentration über Generationen hinweg zunimmt und große Erbschaften steuerlich stark privilegiert werden, ist das eine Frage der fairen Verteilung von Chancen. Vermögensteuern oder strengere Erbschaftsteuern sind deshalb kein exotischer Sonderweg.</dd>
          <dt>Eine Vermögenssteuer zerstört unsere Familienunternehmen und den Mittelstand!</dt>
          <dd>Seriöse Modelle arbeiten mit hohen Freibeträgen und zielen auf sehr große Vermögen. Die besonders großzügigen Privilegien im Erbschaftsteuerrecht kommen heute vor allem bei sehr großen Unternehmensvermögen zum Tragen, nicht bei typischen kleinen Betrieben. Entscheidend ist daher die Ausgestaltung: Kleine und mittlere Betriebe lassen sich schützen, ohne milliardenschwere Übertragungen pauschal zu verschonen.</dd>
          <dt>Die Reichen wandern dann einfach ins Ausland ab!</dt>
          <dd>Abwanderungsrisiken gibt es, aber sie werden oft überschätzt. Wohnsitzentscheidungen hängen nicht nur von einer Steuer ab, sondern auch von Unternehmen, Familie, Infrastruktur und Rechtssicherheit. Zudem kann der Gesetzgeber Wegzugs- und Missbrauchsregeln so ausgestalten, dass reine Steuergestaltung erschwert wird.</dd>
          <dt>Es wird doch schon alles bei der Einkommensteuer versteuert (Doppelbesteuerung)!</dt>
          <dd>Vermögen wächst oft ohne Einkommensteuerzahlung — durch Wertsteigerungen von Immobilien, Aktien oder Unternehmensanteilen. Diese unrealisierten Gewinne werden erst bei Verkauf besteuert, bei Erbschaften oft gar nicht. Zudem: Auch die Mehrwertsteuer ist eine 'Doppelbesteuerung' von bereits versteuertem Einkommen. Das Leistungsfähigkeitsprinzip erlaubt mehrere Steuern auf verschiedene Bemessungsgrundlagen.</dd>
          <dt>Eine Vermögensteuer geht an die Substanz — das zerstört Unternehmen!</dt>
          <dd>Nicht das Unternehmen zahlt, sondern der Eigentümer. Bei einem Steuersatz von 1 % und typischen Kapitalrenditen von 5–10 % lässt sich die Steuer bequem aus den laufenden Erträgen bezahlen. Bei der Erbschaftsteuer ist zudem eine Stundung über 15 Jahre möglich — das entspricht etwa 1–2 % des jährlichen Unternehmensgewinns. Wer ein Unternehmen kauft, muss den vollen Preis sofort aufbringen — nur Erben bekommen Sonderkonditionen.</dd>
          <dt>Die Erbschaftsteuer zwingt Erben dazu, ihr Elternhaus zu verkaufen!</dt>
          <dd>Für das Familienheim gibt es weitreichende Ausnahmen: Wer das geerbte Haus selbst für mindestens 10 Jahre bewohnt, zahlt darauf null Euro Erbschaftsteuer (bis 200 m² Wohnfläche). Zudem gibt es hohe persönliche Freibeträge: 400.000 € pro Kind, 500.000 € für Ehepartner — alle 10 Jahre erneuerbar. 96 % aller Erbfälle fallen komplett unter die Freibeträge. Das 'Elternhaus'-Argument schützt in Wahrheit die Villen der Superreichen.</dd>
          <dt>Die Erhebung einer Vermögenssteuer kostet mehr, als sie einbringt!</dt>
          <dd>Das Verwaltungsargument ist heute schwächer als in den 1990ern. Durch Digitalisierung, Informationsaustausch und die reformierte Immobilienbewertung sind die Voraussetzungen deutlich besser. Entscheidend ist aber auch hier das Design: hohe Freibeträge und klare Bewertungsregeln halten den Aufwand beherrschbar.</dd>
          <dt>Erbschaftsteuer bestraft Leistung und zerstört Lebenswerke!</dt>
          <dd>Erben ist keine eigene Leistung. Gleichzeitig werden große Unternehmensvermögen im geltenden Recht oft weit stärker geschont als normale Erbschaften. Dadurch wird Vermögenskonzentration über Generationen eher verstärkt als abgemildert. Wer kleine und mittlere Erbschaften schützen will, kann Freibeträge hoch halten und Privilegien an der Spitze gezielter abbauen.</dd>
          <dt>Investitionen fließen ab und Firmen gehen ins Ausland!</dt>
          <dd>Standortentscheidungen hängen von vielen Faktoren ab: Fachkräfte, Infrastruktur, Rechtssicherheit, Absatzmärkte und Energiekosten. Eine Vermögensteuer allein entscheidet selten über Investitionen. Wichtig ist daher, sehr große private Vermögen zu adressieren, ohne produktive Unternehmensinvestitionen unnötig zu belasten.</dd>
          <dt>Erben ist Privatsache — der Staat hat da nichts zu suchen!</dt>
          <dd>Art. 14 GG garantiert Eigentum, betont aber auch dessen Sozialpflichtigkeit. Große Erbschaften entstehen nicht losgelöst von staatlich finanzierter Infrastruktur, Bildung und Rechtssicherheit. Deshalb ist ihre Besteuerung keine unzulässige Einmischung, sondern Teil legitimer Verteilungspolitik in einem Sozialstaat.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/gleichberechtigung">Gleichberechtigung</a></h3>
      <p>Fakten zu Bezahlung, Care-Arbeit und Repräsentation</p>
      <ul>
        <li>16 % unbereinigter Gender Pay Gap (2025)</li>
        <li>Frauen leisten 43,4 % mehr unbezahlte Care-Arbeit</li>
        <li>7 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (7)</summary>
        <dl>
          <dt>Frauen verdienen nur deshalb weniger, weil sie sich freiwillig für schlechter bezahlte soziale Berufe entscheiden.</dt>
          <dd>Branche und Beruf erklären rund 18 % der Verdienstlücke. Selbst wenn weitere Faktoren wie Qualifikation, Tätigkeit, Erwerbsbiografie und Teilzeit berücksichtigt werden, bleibt 2025 ein bereinigter Gender Pay Gap von 6 %.</dd>
          <dt>Frauen wollen gar keine Führungspositionen übernehmen, weil ihnen die Familie wichtiger ist.</dt>
          <dd>Die Unterrepräsentation liegt nicht einfach am mangelnden Willen. In Deutschland sind nur 29,1 % der Führungskräfte weiblich, deutlich weniger als im EU-Durchschnitt (35,2 %). Gleichzeitig erschwert die ungleiche Verteilung von Care-Arbeit vielen Frauen den beruflichen Aufstieg.</dd>
          <dt>Die Gleichberechtigung ist doch längst erreicht, Frauen haben heute genau die gleichen Möglichkeiten wie Männer.</dt>
          <dd>Gesetzlich sind Frauen gleichgestellt, faktisch gibt es weiterhin große Lücken. Frauen leisten täglich 76 Minuten mehr unbezahlte Care-Arbeit (Gender Care Gap von 43,4 %). Auch in der politischen Repräsentation gibt es Rückschritte: Im aktuellen Bundestag (2025) ist der Frauenanteil auf 32,4 % gesunken. Echte Gleichberechtigung erfordert auch wirtschaftliche Unabhängigkeit und gleiche Repräsentation.</dd>
          <dt>Männer arbeiten dafür mehr in Vollzeit und machen die harten Überstunden.</dt>
          <dd>Männer leisten zwar mehr bezahlte Erwerbsarbeit, aber wenn man bezahlte und unbezahlte Arbeit zusammenrechnet, ist die Gesamtarbeitszeit ähnlich hoch. Personen ab 18 leisten laut Destatis 2022 insgesamt ähnlich viel Arbeit, Frauen aber etwas mehr (45:33 Std./Woche) als Männer (44:23 Std./Woche), weil unbezahlte Arbeit die geringere Erwerbsarbeit übersteigt.</dd>
          <dt>Eine Frauenquote führt nur dazu, dass unqualifizierte Frauen bevorzugt werden und fähige Männer das Nachsehen haben.</dt>
          <dd>Quoten sind ein Instrument gegen dauerhafte Unterrepräsentation. Dass Frauen in Führungspositionen in Deutschland deutlich unterrepräsentiert sind, ist belegt. Die eigentliche Debatte ist deshalb nicht, ob es ein Problem gibt, sondern welche Instrumente es wirksam und fair verringern.</dd>
          <dt>Frauen bekommen weniger Rente, weil sie halt weniger gearbeitet haben — selbst schuld.</dt>
          <dd>Der Gender Pension Gap liegt 2025 je nach Abgrenzung bei 24,2 % inklusive Hinterbliebenenrenten und bei 36,2 % für eigene Alterseinkünfte. Dahinter stehen niedrigere Löhne, häufigere Teilzeit und Erwerbsunterbrechungen durch Care-Arbeit. Frauen ab 65 sind zudem häufiger armutsgefährdet als Männer (2023: 20,8 % vs. 15,9 %).</dd>
          <dt>Kinder sind eine freiwillige Entscheidung, dann muss man halt mit den Konsequenzen leben.</dt>
          <dd>Kindererziehung ist keine rein private Randfrage, sondern hat große Folgen für Erwerbsbiografien. Eine aktuelle ZEW-Studie zeigt, dass Mütter im vierten Jahr nach der ersten Geburt durchschnittlich fast 30.000 Euro weniger verdienen als gleichaltrige Frauen ohne Kinder. Solche Einbußen wirken langfristig auf Karriere und Rente.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/bildung">Deutsches Bildungssystem</a></h3>
      <p>Fakten zu Ausgaben, Lehrkräftemangel, PISA &amp; Digitalisierung</p>
      <ul>
        <li>198 Mrd. € Bildungsausgaben (2024)</li>
        <li>35.000 fehlende Lehrkräfte (2025/26)</li>
        <li>8 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (8)</summary>
        <dl>
          <dt>Unser Bildungssystem war mal Weltspitze</dt>
          <dd>Deutschland hatte tatsächlich ein international angesehenes Bildungssystem – vor allem in der beruflichen Bildung (duales System). Aber bei PISA 2022 erreichten deutsche 15-Jährige in Mathematik nur noch 475 Punkte – ein historischer Tiefstand und ein Rückgang von 25 Punkten gegenüber 2018. Rund ein Drittel hat in mindestens einem Bereich nur minimale Kompetenzen. Statt sich auf vergangenen Ruhm zu berufen, braucht es massive Investitionen: Deutschland liegt mit 4,5 % des BIP für Bildung deutlich unter dem OECD-Schnitt von 5,1 % und weit hinter Skandinavien (6,5–7,1 %).</dd>
          <dt>Die Lehrer arbeiten doch nur halbtags und haben ständig Ferien</dt>
          <dd>Eine repräsentative Studie des Prognos-Instituts in Sachsen zeigt: In Schulwochen fallen Mehrstunden an. Im Jahresmittel lagen Vollzeit-Lehrkräfte etwa auf ihrem individuellen Soll, Teilzeitkräfte aber 5,8 % darüber. Unterricht ist dabei nur ein Teil der Arbeitszeit – hinzu kommen Vor- und Nachbereitung, Korrekturen, Elterngespräche, Verwaltung und Konferenzen.</dd>
          <dt>Schüler können heute nichts mehr, die sind alle verblödet</dt>
          <dd>Die PISA-Ergebnisse zeigen tatsächlich einen deutlichen Leistungsrückgang, der aber strukturelle Ursachen hat – und keine individuelle 'Verblödung'. Zu den Ursachen gehören chronische Unterfinanzierung (Deutschland liegt unter dem OECD-Schnitt), akuter Lehrkräftemangel (35.000 fehlend), pandemiebedingte Lernrückstände und der stärkste Zusammenhang zwischen sozialer Herkunft und Bildungserfolg in der OECD. Die Lösung liegt nicht bei den Schüler:innen, sondern beim System: bessere Ausstattung, mehr Personal, gezielte Förderung Benachteiligter.</dd>
          <dt>Bildung ist Ländersache, da kann man nichts machen</dt>
          <dd>Das stimmt verfassungsrechtlich – aber es ist kein Naturgesetz. Das Kooperationsverbot von 2006 verhindert, dass der Bund direkt in Schulen investiert. Das Ergebnis: 16 verschiedene Lehrpläne, massive Qualitätsunterschiede zwischen den Bundesländern und ein 'Bildungsflickenteppich'. Mehrere Bundesländer fordern inzwischen selbst die Aufhebung dieses Verbots. Auch der DigitalPakt Schule zeigt, dass Bund-Länder-Kooperation in der Bildung möglich ist – er wurde trotz Kooperationsverbot realisiert. 'Ländersache' heißt nicht 'unveränderbar'.</dd>
          <dt>Wir geben genug Geld für Bildung aus</dt>
          <dd>Nominal klingt die Zahl von 198 Milliarden Euro nach viel. Aber gemessen am BIP liegt Deutschland weiterhin unter dem OECD-Durchschnitt und hinter skandinavischen Ländern. Die Konsequenzen sind sichtbar: marode Schulgebäude, fehlende Lehrkräfte, mangelhafte digitale Infrastruktur und starke Qualitätsunterschiede in der frühen Bildung.</dd>
          <dt>Hauptschüler sind halt einfach nicht so schlau</dt>
          <dd>Das ist ein klassischer Zirkelschluss. PISA zeigt seit Jahren, dass Deutschland zu den OECD-Ländern mit stark ausgeprägten sozialen Bildungsungleichheiten gehört. Kinder aus bildungsfernen Familien werden überproportional auf niedrigere Schulformen verteilt. Das spricht nicht für mangelnde Intelligenz, sondern für strukturelle Probleme wie frühe Selektion, ungleiche Förderung und zu wenig Unterstützung benachteiligter Kinder.</dd>
          <dt>Inklusion schadet normalen Schülern</dt>
          <dd>Die umfassendste deutsche Studie zur Inklusion (INSIDE, 2016–2025, über 4.000 Schüler:innen an 246 Schulen) zeigt: Inklusion 'gelingt weder durchweg noch scheitert grundsätzlich'. Entscheidend sind die Rahmenbedingungen – insbesondere gute Kooperation zwischen Regel- und Sonderpädagogen sowie ausreichend Personal. Die Studie zeigt keine generellen Nachteile für Mitschüler:innen ohne Förderbedarf. Problematisch wird es erst, wenn Inklusion ohne zusätzliche Ressourcen umgesetzt wird. Das Problem ist also nicht die Inklusion an sich, sondern ihre unzureichende Ausstattung.</dd>
          <dt>Digitalisierung an Schulen bringt nichts, Kinder sollen lesen lernen</dt>
          <dd>Digitale Kompetenz und Lesen lernen sind kein Widerspruch – beides gehört zu den Grundkompetenzen des 21. Jahrhunderts. Der DigitalPakt Schule hat Milliarden in Infrastruktur gebunden. Das Problem war nie 'ob', sondern 'wie': Tablets allein verbessern keinen Unterricht. Es braucht pädagogische Konzepte, geschulte Lehrkräfte und IT-Support. Seit 2025 liegt bereits ein Zwischenbericht zur Evaluation vor; der DigitalPakt 2.0 soll stärker auf Qualität statt nur auf Hardware setzen.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/gesundheit">Deutsches Gesundheitssystem</a></h3>
      <p>Fakten zu Kosten, Zwei-Klassen-Medizin, Pflege &amp; Prävention</p>
      <ul>
        <li>OECD-Spitzengruppe bei Gesundheitsausgaben</li>
        <li>17,5 % Gesamt-Beitragssatz GKV (2026)</li>
        <li>8 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (8)</summary>
        <dl>
          <dt>Wir haben das beste Gesundheitssystem der Welt</dt>
          <dd>Deutschland hat ein gutes Gesundheitssystem, aber 'das beste der Welt' ist es nicht automatisch. Deutschland gehört bei den Ausgaben zur OECD-Spitzengruppe, zugleich gibt es lange Wartezeiten für Kassenpatienten, bis 2034 drohen mindestens 90.000 fehlende Pflegekräfte und die Krankenhausstruktur gilt seit Jahren als ineffizient.</dd>
          <dt>Die Krankenkassenbeiträge sind viel zu hoch</dt>
          <dd>Der GKV-Gesamtbeitrag liegt 2026 bei 17,5 % des Bruttogehalts und wird paritätisch geteilt. Das eigentliche Problem ist weniger die Existenz des Beitrags als die Effizienz des Systems: Deutschland gibt sehr viel aus, hat strukturelle Überkapazitäten im Krankenhausbereich und investiert vergleichsweise wenig in Prävention.</dd>
          <dt>Jeder bekommt in Deutschland die medizinische Versorgung, die er braucht</dt>
          <dd>Formal hat jeder Zugang zum Gesundheitssystem, aber in der Praxis gibt es gravierende Versorgungslücken. Kassenpatienten warten beim Lungenfacharzt im Schnitt 129 Tage, Privatpatienten nur 35. Dazu kommen Engpässe in Pflege und Psychotherapie sowie regionale Unterschiede bei der Versorgung. Die Versorgung hängt in Deutschland also weiterhin stark davon ab, wo man lebt, wie man versichert ist und welche Krankheit man hat.</dd>
          <dt>Ausländer belasten unser Gesundheitssystem</dt>
          <dd>Asylbewerber erhalten in den ersten 36 Monaten nur eine stark eingeschränkte medizinische Versorgung, vor allem für akute Erkrankungen, chronische Krankheiten, Schwangerschaft, empfohlene Vorsorgen und Impfungen. Das eigentliche GKV-Finanzierungsproblem hat strukturelle Ursachen wie alternde Bevölkerung, hohe Ausgaben und ineffiziente Strukturen – nicht die medizinische Versorgung von Geflüchteten.</dd>
          <dt>Psychische Krankheiten sind nur Einbildung / Modeerscheinung</dt>
          <dd>Psychische Erkrankungen sind medizinisch genauso real wie körperliche. Im ersten Halbjahr 2025 stiegen die Fallzahlen in Psychotherapie und Psychiatrie weiter um 3,4 %, in der Kinder- und Jugendpsychiatrie sogar um 5,7 %. Die Versorgung hinkt dem Bedarf seit Jahren hinterher.</dd>
          <dt>Homöopathie/Alternativmedizin sollte von der Kasse bezahlt werden</dt>
          <dd>Für homöopathische Mittel gibt es nach aktuellem wissenschaftlichem Konsens keine belastbaren Belege für eine Wirkung über den Placeboeffekt hinaus. Kassengelder sollten deshalb evidenzbasiert eingesetzt werden, gerade in einem System mit klaren Versorgungsengpässen etwa bei Psychotherapie und Pflege.</dd>
          <dt>Es gibt zu viele Krankenhäuser</dt>
          <dd>Da ist tatsächlich etwas dran: Deutschland hat viele Krankenhausbetten und eine vergleichsweise niedrige Bettenauslastung. Aber 'weniger' heißt nicht automatisch 'besser'. Es braucht Spezialisierung, Vernetzung und gleichzeitig Erreichbarkeit – besonders in ländlichen Regionen. Genau diesen Spagat versucht die Krankenhausreform.</dd>
          <dt>Die Pharmaindustrie macht uns absichtlich krank</dt>
          <dd>Diese Verschwörungstheorie hält keiner Prüfung stand. Medikamente durchlaufen strenge Zulassungsverfahren (EMA, BfArM) mit klinischen Studien in mehreren Phasen. Die Pharmabranche verdient an Behandlungen – aber das liegt am Geschäftsmodell, nicht an absichtlicher Schadenszufügung. Berechtigte Kritik gibt es an hohen Medikamentenpreisen, aggressivem Marketing und mangelnder Transparenz bei Studien. Die Lösung ist aber mehr Regulierung und unabhängige Forschung, nicht das Ablehnen evidenzbasierter Medizin. Tatsächlich zeigt Deutschlands System ein anderes Problem: Zu wenig Investition in Prävention (nur 5 % der Ausgaben) und zu viel Fokus auf Behandlung.</dd>
        </dl>
      </details>
