      <h1>Fakten-Stammtisch</h1>
      <p>Faktenbasierte Argumente und Quellen zu politischen und gesellschaftlichen Themen in Deutschland.</p>
      <p>Alle Inhalte als Textdatei: <a href="https://fakten-stammtisch.de/llms-full.txt">fakten-stammtisch.de/llms-full.txt</a></p>
      <h2>Themen</h2>
      <h3><a href="https://fakten-stammtisch.de/thema/heizung">Heizungswechsel 2026</a></h3>
      <p>Wärmepumpe vs. Öl- &amp; Gasheizung | Zahlen · Fakten · Argumente</p>
      <ul>
        <li>21,6 Mio. Heizungen</li>
        <li>75 % fossil</li>
        <li>WP spart 12.000–22.500 €</li>
        <li>9 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (9)</summary>
        <dl>
          <dt>Wärmepumpe lohnt sich nur im Neubau!</dt>
          <dd>Falsch. Fraunhofer ISE (2025): 77 Altbauten (Bj. bis 1826!) vermessen, JAZ 3,4 im Schnitt. Kein Zusammenhang Baujahr/Effizienz. Entscheidend: Heizköpergröße + Hydraulik. Fußbodenheizung NICHT nötig. 80 % aller neuen WP gehen in Bestandsgebäude.</dd>
          <dt>Gas ist doch viel billiger!</dt>
          <dd>Nur bei der Anschaffung: 11.000 vs. 12.500 EUR (nach Förderung). Über 20 Jahre spart die WP 12.000–22.500 EUR. CO₂-Preis ab 2028 marktbasiert (100–250 EUR/t bis 2030), Gasnetz-Entgelte + Bio-Treppe ab 2029 verteuern Gas zusätzlich.</dd>
          <dt>Das Gasnetz bleibt doch!</dt>
          <dd>19 % der Stadtwerke planen Stilllegung. Mannheim: 2035. EU zwingt Netzbetreiber bis 2026 zu Transformationsplänen. Wer als Letzter im Netz bleibt, zahlt bis 10× höhere Entgelte (DIW/Ofgem).</dd>
          <dt>Wasserstoff wird alles lösen!</dt>
          <dd>4 % der Stadtwerke planen H₂ – und für Industrie. MVV Mannheim: „nicht realisierbar“ im Hausnetz. Wer auf H₂-Heizung wartet, wartet auf etwas, das die Versorger selbst ausschließen.</dd>
          <dt>Heizungsgesetz ist doch abgeschafft!</dt>
          <dd>Formal ja (65 %-Regel entfällt im GMG). Aber: CO₂-Preis steigt via EU-Recht (ETS 2), Bio-Treppe macht Gas ab 2029 teurer, Gasnetz schrumpft sowieso. Physik und Markt ignorieren Wahlkampf.</dd>
          <dt>Meine Heizung funktioniert doch noch!</dt>
          <dd>75 % der Ölheizungen und 65 % der Gasheizungen sind &gt; 20 Jahre alt. Wer wartet, verliert den Speed-Bonus (20 %, nur bis 2028) und zahlt länger steigende fossile Betriebskosten.</dd>
          <dt>Die Wärmepumpe ist doch viel zu laut!</dt>
          <dd>In 3 m Entfernung liegt eine moderne WP bei 35–40 dB – leiser als ein normales Gespräch (60 dB). Ab 2026 müssen geförderte Geräte sogar 10 dB unter den EU-Grenzwerten liegen. Das ist Kühlschrank-Niveau.</dd>
          <dt>Das Stromnetz bricht doch zusammen!</dt>
          <dd>1,7 Mio. WP verbrauchen nur 1,6 % des Stroms. Eine WP zieht 2–6 kW – ein Durchlauferhitzer das 3- bis 9-fache. Flexibel gesteuert können WP das Netz sogar stabilisieren und Ausbaukosten um ein Viertel senken (Consentec/BWP 2025).</dd>
          <dt>Bei richtigem Frost funktioniert die WP nicht!</dt>
          <dd>Selbst bei -15 °C liefert eine moderne WP noch COP 2,5–3,0 – aus 1 kWh Strom werden 2,5–3 kWh Wärme. In Norwegen (Oslo: -4 °C im Januar) heizen 632 von 1.000 Haushalten mit WP. Wenn es dort funktioniert, funktioniert es in Deutschland erst recht.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/emobilitaet">E-Mobilität</a></h3>
      <p>Fakten zu Reichweite, Akkus, Kosten &amp; Klimabilanz</p>
      <ul>
        <li>CO₂-Vorteil nach ~25.000 km</li>
        <li>Akkus halten &gt;500.000 km</li>
        <li>7 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (7)</summary>
        <dl>
          <dt>Nach 3 bis 5 Jahren ist der Akku kaputt und ein neuer kostet 15.000 Euro.</dt>
          <dd>Ein Mythos aus der Zeit alter Handys. Moderne E-Auto-Akkus (besonders LFP) halten 1.500 bis 3.000 Ladezyklen. Das entspricht 500.000 bis über 1 Million Kilometern. Der Akku überlebt in der Regel die Karosserie des Autos. Zudem geben Hersteller meist 8 Jahre oder 160.000 km Garantie auf den Akku.</dd>
          <dt>Wenn alle abends ihr E-Auto anstecken, bricht das Stromnetz zusammen.</dt>
          <dd>Nein. 15 Mio. E-Autos brauchen nur ca. 9–10 % unseres heutigen Stroms. Lokale Überlastungen werden durch § 14a EnWG verhindert: Netzbetreiber können Wallboxen bei Engpässen kurzzeitig auf 4,2 kW dimmen. Das reicht immer noch, um über Nacht ~200 km nachzuladen. Niemand bleibt morgens mit leerem Akku stehen.</dd>
          <dt>Wegen der Batterieproduktion ist ein E-Auto klimaschädlicher als ein Diesel.</dt>
          <dd>Falsch. Der CO₂-Rucksack der Produktion ist beim aktuellen deutschen Strommix (62 % Erneuerbare) nach ca. 25.000 km abgefahren. Über den gesamten Lebenszyklus spart ein E-Auto laut ICCT (2025) rund 73 % CO₂ gegenüber einem Benziner ein. Mit Ökostrom ist der Break-Even schon nach ~15.000 km erreicht.</dd>
          <dt>Für E-Autos schuften Kinder im Kongo für Kobalt.</dt>
          <dd>Die Industrie steuert massiv um: Über 50 % der neuen E-Autos (z.B. Tesla Model 3/Y Standard, VW ID-Einstiegsmodelle) nutzen LFP-Akkus. Diese enthalten exakt 0 % Kobalt und 0 % Nickel. Zudem wird Kobalt auch für die Entschwefelung von Benzin und Diesel genutzt – dort regt sich niemand auf, und es wird verbrannt statt recycelt.</dd>
          <dt>Batterien sind nur eine Brückentechnologie, Wasserstoff und E-Fuels sind die Zukunft.</dt>
          <dd>Die Physik spricht dagegen: Ein Wasserstoff-Auto braucht über 2x so viel Strom für die gleiche Strecke wie ein Batterie-Auto. Mit E-Fuels sind es sogar 5–6x so viel. Dieser Strom müsste erst teuer erzeugt werden. E-Fuels und H₂ werden dringend für Flugzeuge, Schiffe und die Industrie gebraucht – im PKW sind sie ineffizient und viel zu teuer.</dd>
          <dt>E-Autos brennen ständig und können nicht gelöscht werden.</dt>
          <dd>Statistiken zeigen das Gegenteil: Verbrenner brennen rund 60-mal häufiger als E-Autos (pro 100.000 Fahrzeuge). Ein Tank voller Benzin neben einem heißen Motor ist gefährlicher als ein gekapselter Akku im Unterboden. Wenn ein E-Auto brennt, ist das Löschen zwar aufwendiger (Kühlung nötig), aber die Feuerwehren sind darauf längst eingestellt.</dd>
          <dt>Mit dem E-Auto komme ich nicht in den Urlaub nach Italien.</dt>
          <dd>Moderne E-Autos haben reale Autobahn-Reichweiten von 300 bis 500 km. Das europäische Schnellladenetz wächst rasant. An einem HPC-Lader (High Power Charger) lädt man in 20 Minuten Strom für weitere 250 km nach – genau die Zeit, die man ohnehin für eine Toiletten- oder Kaffeepause nach 3 Stunden Fahrt einplanen sollte.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/energiewende">Energiewende &amp; Atomkraft</a></h3>
      <p>Fakten zu Erneuerbaren, AKW-Neubau &amp; Versorgungssicherheit</p>
      <ul>
        <li>62 % Erneuerbare im Strommix</li>
        <li>AKW-Neubau 3–5× teurer als Wind/Solar</li>
        <li>7 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (7)</summary>
        <dl>
          <dt>Zeig mir das AKW, das du bauen willst.</dt>
          <dd>55 Mrd. EUR für Hinkley Point C, 15–20 Jahre Bauzeit. In Deutschland: kein Fachpersonal, keine Lieferketten, keine Genehmigungsstrukturen. Neue AKW sind das Gegenteil von „realistisch“. Bei Baubeschluss heute: erster Strom frühestens ~2040.</dd>
          <dt>AKW ersetzen keinen einzigen Schritt der Energiewende.</dt>
          <dd>Selbst alle 17 alten AKW deckten bei verdoppeltem Strombedarf nur ~10%. Netze, Speicher, Windräder braucht man so oder so. Kernkraft ist bestenfalls Ergänzung, kein Alternativpfad.</dd>
          <dt>Die Krise war Gas, nicht Strom.</dt>
          <dd>80% des Erdgases ging in Wärme und Industrie, nicht in Strom. AKW hätten die Gaskrise 2022 strukturell nicht gelöst. Und Uran kommt zu 46% aus Russland und Kasachstan.</dd>
          <dt>Das Problem heißt Bürokratie, nicht Technologie.</dt>
          <dd>400 GW beantragte Speicherleistung zeigen: Der Markt will. Der Engpass sind Netzanschlüsse, Genehmigungsverfahren und Abstandsregeln. Das ist politisches Versagen aller Parteien – kein Versagen der Erneuerbaren.</dd>
          <dt>Aber SMRs lösen doch das Problem!</dt>
          <dd>Es gibt keinen einzigen kommerziellen SMR im Westen. Das am weitesten fortgeschrittene Projekt (Darlington, Kanada) produziert Strom für ~15 Ct/kWh – doppelt so teuer wie Wind/Solar. Das einzige US-Projekt (NuScale) wurde 2023 eingestellt. Frühestmögliche Inbetriebnahme: ~2030.</dd>
          <dt>Atomkraft ist doch abgeschaltet und erledigt!</dt>
          <dd>Über 1.200 Castor-Behälter stehen aktuell in Zwischenlagern, bis zu 1.800 werden es am Ende. Die Endlagersuche dauert bis mindestens 2050. Geschätzte Gesamtkosten: 47,5 Mrd. EUR. Über die Hälfte des Umweltministeriums-Budgets fließt in Atommüll. Neue AKWs würden das Problem nur vergrößern.</dd>
          <dt>Deutschland muss sich doch selbst versorgen können!</dt>
          <dd>Der europäische Stromverbund existiert genau dafür. 2025 importierte DE 76 TWh und exportierte 54 TWh. Skandinavische Wasserkraft kompensiert Dunkelflauten, deutscher Solarüberschuss fließt in Nachbarländer. Das ist kein Versagen, sondern intelligentes Design – und billiger als Autarkie.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/klimawandel">Klimawandel</a></h3>
      <p>Fakten zu Temperatur, Extremwetter, Emissionen &amp; Kippelemente</p>
      <ul>
        <li>2024: Erstmals +1,6 °C über vorindustriellem Niveau</li>
        <li>CO₂-Konzentration: ~427 ppm</li>
        <li>9 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (9)</summary>
        <dl>
          <dt>Das Klima hat sich schon immer verändert!</dt>
          <dd>Stimmt — aber der aktuelle CO₂-Anstieg ist 100-mal schneller als bei natürlichen Zyklen. Nach der letzten Eiszeit stieg CO₂ über 10.000 Jahre um ~80 ppm. Wir haben in nur 150 Jahren +147 ppm draufgelegt. Die Geschwindigkeit ist das Problem: Ökosysteme können sich nicht schnell genug anpassen. (Quelle: NASA, MIT Climate Portal)</dd>
          <dt>Deutschland allein kann das Klima nicht retten!</dt>
          <dd>Deutschland ist historisch der viertgrößte CO₂-Emittent der Welt (93 Mrd. Tonnen kumulativ). Pro Kopf emittieren wir ~7 t CO₂/Jahr — deutlich über dem globalen Durchschnitt von 4,9 t. Wenn jedes Land so argumentierte, passiert gar nichts. Zudem: Deutsche Klimaschutztechnologie (Erneuerbare, Wärmepumpen, E-Autos) ist ein Exportschlager — Handeln schafft Märkte und Arbeitsplätze. (Quellen: Our World in Data 2023, IEA 2023)</dd>
          <dt>Klimaschutz kostet Arbeitsplätze!</dt>
          <dd>Das Gegenteil ist der Fall: Weltweit arbeiten bereits 16,6 Mio. Menschen in der Erneuerbaren-Branche (IRENA 2024). In Deutschland hat sich die Zahl der Stellenausschreibungen in der Energiewende von 173.000 (2019) auf 372.500 (2024) mehr als verdoppelt. Die Branche sucht ~300.000 Fachkräfte. Im Gegensatz dazu: Die Kohleindustrie beschäftigte zuletzt nur noch ~20.000 Menschen. (Quellen: IRENA 2025, BEE 2025, BMWK 2024)</dd>
          <dt>Die Wissenschaftler sind sich doch gar nicht einig!</dt>
          <dd>Doch — zu über 99 %. Eine Metastudie von 2021 (Lynas et al.) wertete 88.125 Fachpublikationen aus: über 99,9 % bestätigen den menschengemachten Klimawandel. Der IPCC AR6 (2023) stuft den menschlichen Einfluss als 'eindeutig' (unequivocal) ein. Keine einzige nationale Wissenschaftsakademie weltweit widerspricht. Zum Vergleich: 97 % Konsens ist höher als der ärztliche Konsens, dass Rauchen Lungenkrebs verursacht. (Quellen: Lynas et al. 2021, IPCC AR6 2023)</dd>
          <dt>Es ist doch gar nicht wärmer geworden — letzter Winter war kalt!</dt>
          <dd>Wetter ≠ Klima. Ein kalter Winter in Deutschland ändert nichts am globalen Trend: 2024 war das wärmste Jahr seit Beginn der Aufzeichnungen (+1,6 °C über vorindustriellem Niveau). Die letzten zehn Jahre waren das wärmste Jahrzehnt ever. 11 von 12 Monaten in 2024 lagen über der 1,5-°C-Schwelle. Einzelne Kälteereignisse entstehen oft gerade durch Klimawandel — z. B. durch gestörte Jetstreams. (Quelle: Copernicus C3S 2025)</dd>
          <dt>CO₂ ist doch gut für Pflanzen!</dt>
          <dd>Im Gewächshaus unter Idealbedingungen stimmt das — aber die Erde ist kein Gewächshaus. In der realen Welt überwiegen die negativen Effekte: Hitzestress, Dürren, Starkregen und Nährstoffmangel reduzieren Ernteerträge. Freilandexperimente (FACE-Studien) zeigen 50 % geringere Erträge als Laborversuche. Eine Stanford-Studie zeigt: Ab 2050 überwiegt der Schaden durch Hitze den CO₂-Düngeeffekt komplett. Außerdem: Mehr CO₂ fördert vor allem Unkräuter, nicht Nutzpflanzen. (Quellen: Yale Climate Connections 2020, Skeptical Science)</dd>
          <dt>China und Indien sind doch viel schlimmer!</dt>
          <dd>China emittiert absolut am meisten — aber pro Kopf liegt China bei ~8 t, Deutschland bei ~7 t und Indien bei nur ~2 t (globaler Schnitt: 4,9 t). Historisch kumuliert hat der Westen das Problem verursacht: USA 24 %, Europa ~22 %, China 14 % der historischen Emissionen. Außerdem produziert China viele Waren für westliche Konsumenten — diese Emissionen müsste man eigentlich uns zurechnen. Und: China installiert mehr Erneuerbare als alle anderen Länder zusammen. (Quellen: Our World in Data 2023, IEA 2023)</dd>
          <dt>Vulkane stoßen mehr CO₂ aus als Menschen!</dt>
          <dd>Falsch — und zwar deutlich. Alle Vulkane weltweit emittieren 150–450 Mio. Tonnen CO₂ pro Jahr. Menschen emittieren 37–59 Milliarden Tonnen — das ist 60- bis 270-mal mehr. Menschen produzieren in weniger als einer Woche so viel CO₂ wie alle Vulkane in einem ganzen Jahr. Sogar einzelne US-Bundesstaaten emittieren mehr als alle Vulkane der Erde zusammen. (Quellen: NOAA, USGS)</dd>
          <dt>Klimaschutz können wir uns nicht leisten!</dt>
          <dd>Nichtstun ist um ein Vielfaches teurer: Laut Potsdam-Institut kostet der Klimawandel bis 2050 jährlich 38 Bio. USD (~17 % des globalen BIP). Klimaschutz erfordert dagegen 1–2 % des BIP pro Jahr — und bringt laut BCG (2025) das 10-Fache zurück. Allein das Ahrtal-Hochwasser 2021 verursachte &gt;40 Mrd. € Schaden. Jeder investierte Euro in Prävention spart ein Vielfaches an Katastrophenkosten. (Quellen: PIK 2024, BCG 2025, GDV 2024)</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/verkehrswende">Verkehrswende</a></h3>
      <p>Fakten zu Mobilität, Flächengerechtigkeit, Radverkehr und Klimazielen</p>
      <ul>
        <li>23 Std./Tag steht ein Auto ungenutzt</li>
        <li>58 % der Berliner Verkehrsfläche für MIV</li>
        <li>11,2 % Radverkehrsanteil (MiD 2023)</li>
        <li>12 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (12)</summary>
        <dl>
          <dt>E-Autos sind doch gar nicht umweltfreundlicher, wenn der Strom aus Kohle kommt!</dt>
          <dd>Selbst beim aktuellen deutschen Strommix ist ein E-Auto über seinen Lebenszyklus deutlich klimafreundlicher als ein Verbrenner. Der Erneuerbare-Anteil lag 2025 bei über 55 %. Der hohe Wirkungsgrad des E-Motors (70–80 %) schlägt die ineffiziente Verbrennung (ca. 20–30 %) bei weitem. Und mit jedem Windrad und Solarpanel wird das E-Auto sauberer — ein Verbrenner nie.</dd>
          <dt>Wir sollten einfach E-Fuels tanken, dann können wir unsere Verbrenner behalten.</dt>
          <dd>E-Fuels sind extrem ineffizient: Für die gleiche Strecke braucht ein damit betriebener Verbrenner 5- bis 7-mal so viel erneuerbaren Strom wie ein E-Auto. E-Fuels werden dringend für Flugzeuge und Schiffe gebraucht, wo Batterien zu schwer sind. Sie für PKW einzusetzen wäre massive Energieverschwendung.</dd>
          <dt>Das Deutschlandticket ist ein Milliardengrab und bringt niemanden dazu, das Auto stehen zu lassen.</dt>
          <dd>Mit rund 14,6 Millionen Nutzern (Ende 2025) ist das Ticket ein enormer Erfolg. Auch nach Preiserhöhungen auf 63 Euro (2026) blieb die Kündigungsquote unter 6 Prozent. Es vereinfacht den Tarifdschungel massiv und entlastet Pendler spürbar. Zum Vergleich: Ein Kleinwagen kostet laut ADAC ab 400 Euro im Monat — das D-Ticket kostet 63 Euro.</dd>
          <dt>Die Reichweite von E-Autos ist viel zu gering für den Alltag.</dt>
          <dd>Die durchschnittliche tägliche Fahrstrecke in Deutschland liegt bei unter 40 Kilometern. Moderne E-Autos bieten reale Reichweiten von 300 bis 500 Kilometern, was für über 95 % aller Alltagsfahrten völlig ausreicht. Zudem wächst das Schnellladenetz kontinuierlich — über 150.000 öffentliche Ladepunkte gab es Ende 2025.</dd>
          <dt>Das Stromnetz bricht zusammen, wenn alle elektrisch fahren.</dt>
          <dd>Studien zeigen, dass selbst bei 15 Millionen E-Autos der Strombedarf nur um etwa 9–10 % des heutigen Verbrauchs steigen würde. Das deutsche Stromnetz kann das bewältigen, besonders durch intelligentes Laden (z. B. nachts, wenn viel Windstrom im Netz ist). Nie mehr als 10 % aller PKW sind gleichzeitig unterwegs — sie laden also auch nicht alle gleichzeitig.</dd>
          <dt>Auf dem Land gibt es keine Ladesäulen, E-Autos funktionieren nur in der Stadt!</dt>
          <dd>Deutschland hatte Ende 2025 über 150.000 öffentliche Ladepunkte, davon über 30.000 Schnellladepunkte. Die Abdeckung verbessert sich kontinuierlich, gerade entlang von Autobahnen. Außerdem: 80 % der Ladevorgänge finden zu Hause oder am Arbeitsplatz statt — die öffentliche Ladesäule ist die Ausnahme. Mit einer Wallbox (ab ca. 500 €) lädt man über Nacht bequem zu Hause.</dd>
          <dt>Autofreie Innenstädte töten den Einzelhandel!</dt>
          <dd>Studien aus ganz Europa zeigen das Gegenteil: Fußgänger und Radfahrer geben in Innenstädten mehr Geld pro Besuch aus als Autofahrer. Autofreie Zonen steigern die Aufenthaltsqualität, erhöhen die Besucherzahlen und stärken den lokalen Handel. Beispiele wie die Superblocks in Barcelona oder autoarme Zonen in Utrecht belegen: Weniger Autos bedeuten mehr Leben und mehr Umsatz.</dd>
          <dt>Radwege sind Geldverschwendung — die nutzt doch kaum jemand!</dt>
          <dd>Der Radverkehrsanteil steigt dort, wo gute Infrastruktur gebaut wird — die Nachfrage folgt dem Angebot. In Oldenburg liegt der Radanteil bei 47 %, in den Niederlanden bei 27 %. Deutschland investiert pro Kopf und Jahr nur einen Bruchteil dessen, was die Niederlande ausgeben. Ein Kilometer Radweg kostet etwa 1–2 Millionen Euro, ein Kilometer Autobahn 10–30 Millionen.</dd>
          <dt>Tempo 30 in der Stadt ist völlig übertrieben und bringt nichts.</dt>
          <dd>Tempo 30 senkt die Unfallschwere drastisch: Bei 30 km/h liegt das Todesfallrisiko für Fußgänger bei ca. 10 %, bei 50 km/h bei ca. 40 %. Zudem reduziert Tempo 30 den Straßenlärm deutlich — laut UBA die Hauptquelle von Lärmbelästigung in Deutschland. 30 Prozent aller Verkehrstoten sterben wegen überhöhter Geschwindigkeit. Tempo 30 macht Städte sicherer, leiser und lebenswerter.</dd>
          <dt>Deutschland ist ein Autoland — ohne Auto kommst du nicht zur Arbeit!</dt>
          <dd>In Großstädten besitzen rund 40 % der Haushalte kein Auto und kommen trotzdem zur Arbeit. Das Problem ist nicht, dass Menschen das Auto lieben, sondern dass Alternativen oft fehlen — besonders auf dem Land. Mit besserem ÖPNV-Takt, Rufbussen und sicheren Radwegen wird echte Wahlfreiheit möglich. Die durchschnittliche Pendelstrecke beträgt unter 20 km — das ist auch mit E-Bike oder Bus machbar.</dd>
          <dt>SUVs sind sicherer für meine Familie, deshalb brauche ich einen.</dt>
          <dd>SUVs mögen für die Insassen etwas sicherer sein, aber sie erhöhen das Risiko für alle anderen Verkehrsteilnehmer massiv — besonders für Kinder und Fußgänger. Die höhere Motorhaube trifft bei einem Aufprall den Oberkörper statt der Beine. Gleichzeitig brauchen SUVs mehr Parkfläche und verursachen durch ihr höheres Gewicht mehr Reifenabrieb und Feinstaub. Echte Sicherheit entsteht durch Tempo 30, gute Radwege und Vision Zero — nicht durch Aufrüstung.</dd>
          <dt>Verkehrswende ist doch nur ein Großstadtthema — auf dem Land braucht man das Auto!</dt>
          <dd>Gerade auf dem Land braucht es die Verkehrswende am dringendsten: Die Abhängigkeit vom Auto ist dort am größten und trifft besonders jene, die sich kein Auto leisten können — Jugendliche, Ältere, Menschen mit niedrigem Einkommen. Lösungen wie Rufbusse, bessere Bahntaktung, sichere Radwege und E-Bike-Förderung können echte Wahlfreiheit schaffen. In vielen ländlichen Regionen fährt der Bus nur alle 2 Stunden — das ist kein Argument gegen die Verkehrswende, sondern dafür.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/buergergeld">Bürgergeld</a></h3>
      <p>Fakten zu Regelsätzen, Sanktionen und Lohnabstand</p>
      <ul>
        <li>563 € Regelsatz (Nullrunde 2025/2026)</li>
        <li>557 € Einkommensvorteil bei Mindestlohn (Single)</li>
        <li>6 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (6)</summary>
        <dl>
          <dt>Wer arbeitet, ist doch der Dumme. Mit Bürgergeld hat man am Ende mehr in der Tasche!</dt>
          <dd>Das stimmt nicht. Das Lohnabstandsgebot ist gewahrt. Eine WSI-Studie zeigt, dass ein Single, der Vollzeit zum Mindestlohn arbeitet, im Schnitt 557 Euro mehr im Monat zur Verfügung hat als jemand, der Bürgergeld bezieht. Bei Familien ist der Abstand oft noch größer, da Erwerbstätige zusätzlich Anspruch auf Kinderzuschlag und Wohngeld haben.</dd>
          <dt>Das Bürgergeld ist eine soziale Hängematte. Man muss gar nichts mehr machen und bekommt trotzdem Geld.</dt>
          <dd>Das Bürgergeld ist an strikte Pflichten geknüpft. Wer Termine beim Jobcenter unentschuldigt versäumt oder zumutbare Arbeit ablehnt, dem werden die Leistungen gekürzt (Sanktionen). Für sogenannte 'Totalverweigerer' kann der Regelsatz seit 2024 sogar für zwei Monate komplett (zu 100 %) gestrichen werden.</dd>
          <dt>Die Bürgergeld-Empfänger bekommen jedes Jahr massiv mehr Geld, während die Löhne stagnieren!</dt>
          <dd>Die Regelsätze werden streng nach einem gesetzlichen Mechanismus an die Inflation und die Lohnentwicklung angepasst. Weil die Inflation zuletzt gesunken ist, gab es für 2025 eine 'Nullrunde' – das Bürgergeld wurde nicht erhöht. Auch für 2026 ist eine Nullrunde beschlossen. Der Regelsatz für Singles bleibt bei 563 Euro.</dd>
          <dt>Das System wird doch nur ausgenutzt. Fast alle betrügen beim Bürgergeld!</dt>
          <dd>Leistungsmissbrauch existiert, ist aber statistisch gesehen die absolute Ausnahme. Bei rund 5,5 Millionen Beziehenden registrierte die Bundesagentur für Arbeit im Jahr 2024 beispielsweise 421 Fälle von bandenmäßigem Betrug. Die Jobcenter prüfen Anträge sehr genau und gleichen Daten automatisch ab, um Missbrauch zu verhindern.</dd>
          <dt>Das Bürgergeld lockt nur Ausländer an, die sich hier auf unsere Kosten ein schönes Leben machen.</dt>
          <dd>Bürgergeld ist die Grundsicherung für Arbeitsuchende, kein bedingungsloses Einkommen. EU-Ausländer haben in den ersten Monaten der Arbeitssuche in der Regel gar keinen Anspruch. Asylbewerber bekommen Leistungen nach dem Asylbewerberleistungsgesetz, die deutlich niedriger sind als das Bürgergeld. Wer Bürgergeld bezieht, muss dem Arbeitsmarkt zur Verfügung stehen und Integrationsmaßnahmen (wie Sprachkurse) besuchen.</dd>
          <dt>Ukraine-Flüchtlinge bekommen sofort Bürgergeld, ohne jemals eingezahlt zu haben!</dt>
          <dd>Ukrainische Geflüchtete erhalten seit Juni 2022 tatsächlich Bürgergeld statt Asylbewerberleistungen — das war eine bewusste politische Entscheidung, um ihre schnellere Integration in den Arbeitsmarkt zu fördern. Sie unterliegen den gleichen Pflichten wie alle Beziehenden: Termine wahrnehmen, an Integrationskursen teilnehmen, dem Arbeitsmarkt zur Verfügung stehen. Rund 266.000 erwerbsfähige Ukrainer waren Ende 2025 in Beschäftigung. Das Bürgergeld ist zudem keine Versicherungsleistung — es wird aus Steuermitteln finanziert, nicht aus eingezahlten Beiträgen.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/migration">Migration &amp; Asyl</a></h3>
      <p>Fakten zu Einwanderung, Flucht und Arbeitsmarkt in Deutschland</p>
      <ul>
        <li>Rückgang der Asylanträge um 50,7 % (2025)</li>
        <li>64 % der 2015-Geflüchteten in Arbeit</li>
        <li>7 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (7)</summary>
        <dl>
          <dt>Die Asylzahlen explodieren immer weiter, wir werden überrannt!</dt>
          <dd>Tatsächlich sind die Asylerstanträge 2025 massiv gesunken. Mit 113.236 Erstanträgen gab es einen Rückgang von über 50 % im Vergleich zum Vorjahr (2024: 229.751). Im Januar 2026 setzte sich dieser Trend mit einem weiteren Rückgang von fast 49 % zum Vorjahresmonat fort.</dd>
          <dt>Die Flüchtlinge von 2015 leben alle nur vom Bürgergeld und arbeiten nicht.</dt>
          <dd>Nach 10 Jahren (Stand 2025) liegt die Beschäftigungsquote der 2015 zugezogenen Geflüchteten bei 64 % und nähert sich damit dem Bevölkerungsdurchschnitt (70 %) an. Rund die Hälfte der beschäftigten Geflüchteten übt inzwischen eine qualifizierte Tätigkeit als Fachkraft oder Spezialist aus.</dd>
          <dt>Ausländer nehmen uns die guten Jobs weg.</dt>
          <dd>Geflüchtete und Zugewanderte arbeiten überdurchschnittlich oft in sogenannten Engpassberufen, in denen ohnehin Personal fehlt (z.B. Pflege, Logistik, Handwerk). Ohne sie wäre der Personalmangel in vielen systemrelevanten Bereichen noch deutlich größer.</dd>
          <dt>Die Zuwanderung bringt uns wirtschaftlich nichts, sie kostet nur.</dt>
          <dd>Angesichts des demografischen Wandels (Renteneintritt der Boomer-Generation) schrumpft das inländische Erwerbspersonenpotenzial. Die Bundesagentur für Arbeit und das IAB betonen regelmäßig, dass Deutschland auf Zuwanderung angewiesen ist, um den Arbeitskräftemangel abzufedern und die Sozialsysteme (wie die Rente) stabil zu halten.</dd>
          <dt>Die meisten Geflüchteten sind ungebildet und können hier gar nicht arbeiten.</dt>
          <dd>Zwar dauern Spracherwerb und Nachqualifizierung ihre Zeit, aber Daten des IAB zeigen: 7-8 Jahre nach dem Zuzug arbeiten rund 50 % der beschäftigten Geflüchteten als Fachkräfte oder Spezialisten. Die Integration in den Arbeitsmarkt verläuft stetig, braucht aber anfangs Investitionen in Bildung und Sprache.</dd>
          <dt>Ausländer sind krimineller als Deutsche, das zeigt doch die Kriminalstatistik!</dt>
          <dd>In der Polizeilichen Kriminalstatistik (PKS) sind Ausländer tatsächlich überrepräsentiert. Aber: Die PKS vergleicht Äpfel mit Birnen. Kriminalität korreliert stark mit Alter (junge Männer = höchste Kriminalität), sozioökonomischem Status und Wohnsituation — Faktoren, bei denen sich die Gruppe der Zugewanderten strukturell von der Gesamtbevölkerung unterscheidet. Bereinigt man um Alter, Geschlecht und soziale Lage, schrumpft der Unterschied massiv. Zudem enthält die PKS ausländerrechtliche Verstöße (z. B. illegaler Aufenthalt), die Deutsche gar nicht begehen können.</dd>
          <dt>Migration kostet uns nur Milliarden und bringt wirtschaftlich nichts!</dt>
          <dd>Integration kostet anfangs tatsächlich Geld — für Sprachkurse, Unterbringung und Qualifizierung. Langfristig zahlt sich das aber aus: Nach 10 Jahren liegt die Beschäftigungsquote der 2015-Geflüchteten bei 64 % (Männer: 76 %). Zugewanderte zahlen Steuern und Sozialabgaben und tragen dazu bei, den demografischen Fachkräftemangel abzufedern. Laut dem Institut der deutschen Wirtschaft (IW) leisten die rund 3 Mio. erwerbstätigen Ausländer einen unverzichtbaren Beitrag zur Finanzierung der Sozialsysteme.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/teilzeit">Teilzeit &amp; Arbeitsmoral</a></h3>
      <p>Arbeiten wir immer weniger? Fakten zu Arbeitsvolumen, Care-Arbeit und der Gen Z.</p>
      <ul>
        <li>61,26 Mrd. Stunden Gesamtarbeitsvolumen (2025)</li>
        <li>39,9 % Teilzeitquote (Rekordhoch)</li>
        <li>5 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (5)</summary>
        <dl>
          <dt>Die Leute wollen heute alle nur noch in Teilzeit arbeiten und ihre Freizeit genießen.</dt>
          <dd>Der Wunsch nach mehr Freizeit ist zwar der häufigste Grund (27,9 %), aber fast genauso viele (23,5 %) arbeiten in Teilzeit, weil sie Care-Arbeit leisten (Kinderbetreuung oder Pflege von Angehörigen). Bei Frauen ist Care-Arbeit mit fast 29 % sogar der Hauptgrund.</dd>
          <dt>Wegen der ganzen Teilzeit geht in Deutschland die Arbeitsleistung zurück.</dt>
          <dd>Das Gesamtarbeitsvolumen in Deutschland ist historisch hoch. 2025 lag es bei 61,26 Milliarden Stunden und damit nur minimal (-0,2 %) unter dem Vorjahr. Die gestiegene Teilzeitquote wird durch eine insgesamt höhere Zahl an Erwerbstätigen (knapp 46 Millionen) weitgehend ausgeglichen.</dd>
          <dt>Die Gen Z ist arbeitsscheu und will nicht mehr richtig arbeiten.</dt>
          <dd>Daten des IAB widerlegen das: Die Erwerbsbeteiligung der 20- bis 24-Jährigen ist seit 2015 um über 6 Prozentpunkte auf 76 % gestiegen. Die junge Generation ist so stark in den Arbeitsmarkt integriert wie lange nicht mehr.</dd>
          <dt>Die jungen Leute machen alle nur noch Teilzeit, weil sie keine Lust auf 40 Stunden haben.</dt>
          <dd>Der starke Anstieg der Teilzeit bei jungen Menschen liegt vor allem daran, dass viel mehr Studierende nebenbei arbeiten. Die Erwerbsquote von Studierenden (20-24 Jahre) stieg von knapp 37 % auf 56 %. Sie arbeiten also zusätzlich zum Studium, nicht weniger.</dd>
          <dt>Wenn wir die Teilzeit abschaffen, haben wir keinen Fachkräftemangel mehr.</dt>
          <dd>Das ist ein Trugschluss. Viele Menschen in Teilzeit (z. B. wegen Care-Arbeit, Krankheit oder Studium) stünden dem Arbeitsmarkt ohne Teilzeitangebote gar nicht zur Verfügung. Teilzeit ermöglicht es vielen erst, überhaupt erwerbstätig zu sein.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/vegane-ernaehrung">Vegane Ernährung &amp; Fleischkonsum</a></h3>
      <p>Auswirkungen auf Klima, Umwelt und Gesundheit</p>
      <ul>
        <li>~50 % weniger CO₂-Emissionen durch vegane Ernährung</li>
        <li>75 % der globalen Agrarfläche könnten eingespart werden</li>
        <li>6 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (6)</summary>
        <dl>
          <dt>Für das Soja im Tofu der Veganer wird der Regenwald abgeholzt!</dt>
          <dd>Das ist ein Mythos. Etwa 75-80% der weltweiten Sojaernte werden als Tierfutter (für Schweine, Rinder, Geflügel) verwendet. Nur etwa 20% werden direkt von Menschen konsumiert oder zu Öl verarbeitet. Zudem stammt das Soja für Tofu und Sojamilch in europäischen Supermärkten fast ausschließlich aus europäischem oder kanadischem Anbau und ist meist gentechnikfrei. Wer den Regenwald schützen will, sollte also primär weniger Fleisch essen.</dd>
          <dt>Veganer haben doch alle Nährstoffmangel, besonders bei Protein und Vitamin B12.</dt>
          <dd>Proteinmangel ist bei ausreichender Kalorienzufuhr und einer Kombination aus Hülsenfrüchten, Getreide und Nüssen in westlichen Ländern praktisch nicht existent. Vitamin B12 muss bei veganer Ernährung tatsächlich supplementiert werden. Was viele nicht wissen: Auch Nutztieren wird B12 oft künstlich ins Futter gemischt, da sie es aufgrund steriler Haltungsbedingungen nicht mehr ausreichend selbst aufnehmen. Veganer nehmen das Supplement also nur direkt, statt den Umweg über das Tier zu gehen.</dd>
          <dt>Der Mensch ist ein Allesfresser, wir haben schon immer Fleisch gegessen.</dt>
          <dd>Dass wir Fleisch verdauen können, bedeutet nicht, dass wir es in den heutigen Mengen essen müssen. Historisch gesehen war Fleisch für die meiste Zeit der Menschheitsgeschichte eher eine seltene Beilage. Unser Verdauungssystem ist hervorragend an eine stark pflanzliche Kost angepasst. Der heutige extreme Fleischkonsum (in Deutschland ca. 53 kg pro Kopf im Jahr, BLE 2024) ist ein modernes Phänomen und wird mit Zivilisationskrankheiten wie Herz-Kreislauf-Erkrankungen, Gicht und bestimmten Krebsarten in Verbindung gebracht.</dd>
          <dt>Pflanzenmilch wie Mandelmilch verbraucht doch auch extrem viel Wasser!</dt>
          <dd>Es stimmt, dass Mandeln relativ viel Wasser benötigen (ca. 371 Liter pro Liter Mandelmilch). Das ist aber immer noch deutlich weniger als für Kuhmilch (ca. 628 Liter). Zudem gibt es extrem ressourcenschonende Alternativen: Hafermilch benötigt nur etwa 48 Liter Wasser pro Liter und verursacht rund 70% weniger Treibhausgase als Kuhmilch. Hafer wächst zudem regional in Europa.</dd>
          <dt>Veganismus ist nur ein teurer Lifestyle für privilegierte Großstädter.</dt>
          <dd>Vegane Grundnahrungsmittel wie Reis, Kartoffeln, Nudeln, Linsen, Bohnen, Haferflocken und saisonales Gemüse gehören zu den günstigsten Lebensmitteln überhaupt. Eine Studie der Oxford University zeigte, dass eine vollwertige vegane Ernährung in westlichen Ländern die Lebensmittelkosten um bis zu ein Drittel senken kann. Teuer sind lediglich hochverarbeitete Ersatzprodukte, die aber für eine gesunde Ernährung nicht zwingend notwendig sind.</dd>
          <dt>Wenn alle vegan werden, verlieren unsere Landwirte ihre Existenz!</dt>
          <dd>Ein Wandel der Ernährungsgewohnheiten passiert nicht über Nacht, sondern über Jahrzehnte. Das gibt der Landwirtschaft Zeit, sich anzupassen. Der Anbau von pflanzlichen Proteinen für den direkten menschlichen Verzehr (wie Hafer, Erbsen, Lupinen) bietet riesige neue Marktchancen. Subventionen, die aktuell stark die Tierhaltung fördern, könnten umgeleitet werden, um Landwirte bei dieser Transformation finanziell zu unterstützen.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/vermoegenssteuer">Vermögens- und Erbschaftssteuer</a></h3>
      <p>Verteilung von Reichtum und Besteuerung von großen Vermögen in Deutschland</p>
      <ul>
        <li>Das reichste 1 % besitzt mindestens 26 % des Vermögens</li>
        <li>Nur 0,9 % BIP vermögensbezogene Steuern (OECD: 1,9 %)</li>
        <li>11 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (11)</summary>
        <dl>
          <dt>Wir sind sowieso schon Hochsteuerland, eine Vermögenssteuer macht uns kaputt!</dt>
          <dd>Bei den Steuern auf Arbeit (Einkommensteuer, Sozialabgaben) gehört Deutschland tatsächlich zur Weltspitze. Bei den vermögensbezogenen Steuern liegt Deutschland mit nur 0,9 % des BIP aber bei weniger als der Hälfte des OECD-Durchschnitts (1,9 %). UK erhebt über 4 %, die USA 3 %. Gerade weil Arbeit so hoch belastet ist, wäre eine Verlagerung hin zu Vermögenssteuern ökonomisch sinnvoll — auch IWF und OECD empfehlen das.</dd>
          <dt>Das ist doch reine Neidsteuer! Typisch deutsche Neidgesellschaft!</dt>
          <dd>Es geht nicht um Neid, sondern um Chancengerechtigkeit. 72 % der deutschen Milliardäre sind Erben, nicht Selfmade. Über 50 % des Privatvermögens ist geerbt, nicht selbst erarbeitet. Wenn Geburt wichtiger wird als Leistung, ist das kein Neidproblem — sondern ein Gerechtigkeitsproblem. Auch die Schweiz, Norwegen und Spanien haben eine Vermögensteuer, ohne als 'Neidgesellschaften' zu gelten.</dd>
          <dt>Eine Vermögenssteuer zerstört unsere Familienunternehmen und den Mittelstand!</dt>
          <dd>Alle aktuellen Modelle sehen hohe Freibeträge vor (mindestens 1–2 Mio. €, teils bis 100 Mio. €). Echte Mittelständler wären kaum betroffen. Die Realität: 64 % des begünstigten Erbvermögens landet bei wenigen hundert Überreichen (Durchschnitt: 70 Mio. € pro Person). Es geht nicht um die Bäckerei, sondern um die BMW-Erben. Zudem: Wer ein Unternehmen kauft, muss den vollen Preis aus eigener Tasche zahlen — nur Erben bekommen es geschenkt.</dd>
          <dt>Die Reichen wandern dann einfach ins Ausland ab!</dt>
          <dd>Massenhafte Abwanderung ist ein Mythos. Studien (u.a. NBER 2024) zeigen kaum Einfluss von Vermögenssteuern auf Wohnsitzentscheidungen. Die meisten Vermögenden sind lokal verwurzelt — Immobilien, Unternehmen, Netzwerke, Kinder in der Schule. In Deutschland belegenes Vermögen bleibt ohnehin steuerpflichtig. Die Schweiz hat eine Vermögensteuer und ist trotzdem das beliebteste Ziel für Reiche. Zudem gibt es eine Wegzugsbesteuerung, die den steuerfreien Vermögenstransfer verhindert.</dd>
          <dt>Es wird doch schon alles bei der Einkommensteuer versteuert (Doppelbesteuerung)!</dt>
          <dd>Vermögen wächst oft ohne Einkommensteuerzahlung — durch Wertsteigerungen von Immobilien, Aktien oder Unternehmensanteilen. Diese unrealisierten Gewinne werden erst bei Verkauf besteuert, bei Erbschaften oft gar nicht. Zudem: Auch die Mehrwertsteuer ist eine 'Doppelbesteuerung' von bereits versteuertem Einkommen. Das Leistungsfähigkeitsprinzip erlaubt mehrere Steuern auf verschiedene Bemessungsgrundlagen.</dd>
          <dt>Eine Vermögensteuer geht an die Substanz — das zerstört Unternehmen!</dt>
          <dd>Nicht das Unternehmen zahlt, sondern der Eigentümer. Bei einem Steuersatz von 1 % und typischen Kapitalrenditen von 5–10 % lässt sich die Steuer bequem aus den laufenden Erträgen bezahlen. Bei der Erbschaftsteuer ist zudem eine Stundung über 15 Jahre möglich — das entspricht etwa 1–2 % des jährlichen Unternehmensgewinns. Wer ein Unternehmen kauft, muss den vollen Preis sofort aufbringen — nur Erben bekommen Sonderkonditionen.</dd>
          <dt>Die Erbschaftsteuer zwingt Erben dazu, ihr Elternhaus zu verkaufen!</dt>
          <dd>Für das Familienheim gibt es weitreichende Ausnahmen: Wer das geerbte Haus selbst für mindestens 10 Jahre bewohnt, zahlt darauf null Euro Erbschaftsteuer (bis 200 m² Wohnfläche). Zudem gibt es hohe persönliche Freibeträge: 400.000 € pro Kind, 500.000 € für Ehepartner — alle 10 Jahre erneuerbar. 96 % aller Erbfälle fallen komplett unter die Freibeträge. Das 'Elternhaus'-Argument schützt in Wahrheit die Villen der Superreichen.</dd>
          <dt>Die Erhebung einer Vermögenssteuer kostet mehr, als sie einbringt!</dt>
          <dd>Ein Argument aus den 1990er Jahren. Durch Digitalisierung, automatisierten Informationsaustausch und die aktualisierte Immobilienbewertung der Grundsteuer-Reform 2025 wäre der Verwaltungsaufwand deutlich geringer als früher. Die Erhebungskosten liegen bei unter 2–5 % der Einnahmen — vergleichbar mit der Einkommensteuer. Die Schweiz erhebt die Vermögensteuer seit über 100 Jahren effizient auf Kantonsebene.</dd>
          <dt>Erbschaftsteuer bestraft Leistung und zerstört Lebenswerke!</dt>
          <dd>Erben ist keine eigene Leistung — die Leistung hat der Erblasser erbracht. Von den 300–400 Mrd. € die jährlich vererbt werden, werden nur 113 Mrd. steuerlich erfasst. Der effektive Steuersatz liegt bei 2–3 %. Schlimmer: Milliardenerben zahlen effektiv nur 0,1–1,8 %, während normale Erben bis zu 14 % zahlen. 40 Kinder unter 14 Jahren erhielten zusammen 33 Mrd. € steuerbefreites Betriebsvermögen. Das 'Lebenswerk'-Argument schützt in Wahrheit dynastische Privilegien.</dd>
          <dt>Investitionen fließen ab und Firmen gehen ins Ausland!</dt>
          <dd>Standortentscheidungen hängen von dutzenden Faktoren ab: Fachkräfte, Infrastruktur, Rechtssicherheit, Absatzmärkte. Die Schweiz, Norwegen und Spanien haben eine Vermögensteuer — und blühen wirtschaftlich. In Deutschland belegenes Betriebsvermögen kann nicht einfach 'abfließen'. Studien zeigen: Kapitalsteuern beeinflussen Investitionsentscheidungen weit weniger als Lohnnebenkosten, Energiepreise oder Bürokratie.</dd>
          <dt>Erben ist Privatsache — der Staat hat da nichts zu suchen!</dt>
          <dd>Art. 14 GG garantiert das Eigentumsrecht — enthält aber ausdrücklich die Sozialpflichtigkeit des Eigentums. Große Erbschaften entstehen nicht im Vakuum: Sie basieren auf Infrastruktur, Bildungssystem, Rechtsstaat und sozialer Stabilität, die von der Allgemeinheit finanziert werden. Wenn 0,7 % der Steuerpflichtigen 68 % aller steuerbefreiten Firmenvermögen erhalten, ist das keine Privatsache — es betrifft die Chancen aller.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/gleichberechtigung">Gleichberechtigung</a></h3>
      <p>Fakten zu Bezahlung, Care-Arbeit und Repräsentation</p>
      <ul>
        <li>16 % unbereinigter Gender Pay Gap (2025)</li>
        <li>Frauen leisten 43,4 % mehr unbezahlte Care-Arbeit</li>
        <li>7 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (7)</summary>
        <dl>
          <dt>Frauen verdienen nur deshalb weniger, weil sie sich freiwillig für schlechter bezahlte soziale Berufe entscheiden.</dt>
          <dd>Die Berufswahl erklärt nur etwa 18 % der Verdienstlücke. Selbst wenn man Faktoren wie Branche, Beruf, Qualifikation und Teilzeitarbeit herausrechnet, bleibt ein 'bereinigter' Gender Pay Gap von 6 % (Stand 2025). Zudem muss gesellschaftlich hinterfragt werden, warum systemrelevante Care-Berufe strukturell schlechter bezahlt werden als technische Berufe.</dd>
          <dt>Frauen wollen gar keine Führungspositionen übernehmen, weil ihnen die Familie wichtiger ist.</dt>
          <dd>Die Unterrepräsentation liegt primär an strukturellen Hürden, nicht am mangelnden Willen. In Deutschland sind nur 29,1 % der Führungskräfte weiblich, was deutlich unter dem EU-Schnitt (35,2 %) liegt. Eine Unternehmenskultur, die ständige Verfügbarkeit belohnt, sowie die ungleiche Verteilung von Care-Arbeit benachteiligen Frauen beim Aufstieg systematisch.</dd>
          <dt>Die Gleichberechtigung ist doch längst erreicht, Frauen haben heute genau die gleichen Möglichkeiten wie Männer.</dt>
          <dd>Gesetzlich sind Frauen gleichgestellt, faktisch gibt es weiterhin große Lücken. Frauen leisten täglich 76 Minuten mehr unbezahlte Care-Arbeit (Gender Care Gap von 43,4 %). Auch in der politischen Repräsentation gibt es Rückschritte: Im aktuellen Bundestag (2025) ist der Frauenanteil auf 32,4 % gesunken. Echte Gleichberechtigung erfordert auch wirtschaftliche Unabhängigkeit und gleiche Repräsentation.</dd>
          <dt>Männer arbeiten dafür mehr in Vollzeit und machen die harten Überstunden.</dt>
          <dd>Männer leisten zwar mehr bezahlte Erwerbsarbeit, aber wenn man bezahlte und unbezahlte Arbeit (Haushalt, Kinder, Pflege) zusammenrechnet, arbeiten Frauen insgesamt mehr Stunden pro Woche. Das Problem: Die unbezahlte Arbeit der Frauen wird finanziell nicht entlohnt und ist nicht rentenwirksam, was im Alter zu einer massiven Rentenlücke (Gender Pension Gap) führt.</dd>
          <dt>Eine Frauenquote führt nur dazu, dass unqualifizierte Frauen bevorzugt werden und fähige Männer das Nachsehen haben.</dt>
          <dd>Quotenregelungen greifen juristisch nur bei gleicher Qualifikation der Bewerberinnen. Aktuell werden Führungspositionen oft über informelle, männlich dominierte Netzwerke besetzt ('Thomas-Kreislauf'), nicht zwingend nach objektiver Bestenauslese. Studien zeigen zudem, dass diverse Führungsteams innovativer und wirtschaftlich erfolgreicher agieren.</dd>
          <dt>Frauen bekommen weniger Rente, weil sie halt weniger gearbeitet haben — selbst schuld.</dt>
          <dd>Der Gender Pension Gap liegt bei rund 30 %: Frauen erhalten im Schnitt deutlich weniger Rente als Männer. Das ist die direkte Folge jahrzehntelanger struktureller Benachteiligung: niedrigere Löhne (16 % Pay Gap), erzwungene Teilzeit durch Care-Arbeit (43,4 % Care Gap) und Karriereeinbußen nach der Geburt von Kindern. All das akkumuliert sich über ein Arbeitsleben zu massiver Altersarmut. Frauen sind doppelt so häufig von Altersarmut betroffen wie Männer.</dd>
          <dt>Kinder sind eine freiwillige Entscheidung, dann muss man halt mit den Konsequenzen leben.</dt>
          <dd>Kinder sind eine gesamtgesellschaftliche Notwendigkeit — ohne sie gibt es keine Renten, keine Pflege, keine Wirtschaft. Studien zeigen: Frauen verlieren nach dem ersten Kind durchschnittlich ~60 % ihres Einkommens (langfristig ~40 %), Männer: 0 %. Diese sogenannte 'Child Penalty' trifft fast ausschließlich Mütter und ist eine der Hauptursachen für den Gender Pay Gap. Die Lösung liegt in besserer Infrastruktur (Kitas, Ganztag), partnerschaftlicher Aufteilung der Care-Arbeit und Arbeitszeitmodellen, die Vereinbarkeit ermöglichen.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/bildung">Deutsches Bildungssystem</a></h3>
      <p>Fakten zu Ausgaben, Lehrkräftemangel, PISA &amp; Digitalisierung</p>
      <ul>
        <li>198 Mrd. € Bildungsausgaben (2024)</li>
        <li>35.000 fehlende Lehrkräfte (2025/26)</li>
        <li>8 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (8)</summary>
        <dl>
          <dt>Unser Bildungssystem war mal Weltspitze</dt>
          <dd>Deutschland hatte tatsächlich ein international angesehenes Bildungssystem – vor allem in der beruflichen Bildung (duales System). Aber bei PISA 2022 erreichten deutsche 15-Jährige in Mathematik nur noch 475 Punkte – ein historischer Tiefstand und ein Rückgang von 25 Punkten gegenüber 2018. Rund ein Drittel hat in mindestens einem Bereich nur minimale Kompetenzen. Statt sich auf vergangenen Ruhm zu berufen, braucht es massive Investitionen: Deutschland liegt mit 4,5 % des BIP für Bildung deutlich unter dem OECD-Schnitt von 5,1 % und weit hinter Skandinavien (6,5–7,1 %).</dd>
          <dt>Die Lehrer arbeiten doch nur halbtags und haben ständig Ferien</dt>
          <dd>Eine repräsentative Studie des Prognos-Instituts (2024/25, Sachsen, 3.772 Lehrkräfte) zeigt: Vollzeit-Lehrkräfte leisten während der Schulzeit durchschnittlich 2,5 Überstunden pro Woche. Die Unterrichtszeit macht nur etwa ein Drittel der Arbeitszeit aus – der Rest geht für Vor- und Nachbereitung, Korrekturen, Elterngespräche, Verwaltung und Konferenzen drauf. Teilzeitkräfte arbeiten sogar 5,8 % über ihrem Soll. Die Ferien werden großteils für den Überstundenausgleich und Unterrichtsvorbereitung genutzt. Gleichzeitig zeigen Studien erhebliche Risiken für die psychische Gesundheit von Lehrkräften.</dd>
          <dt>Schüler können heute nichts mehr, die sind alle verblödet</dt>
          <dd>Die PISA-Ergebnisse zeigen tatsächlich einen deutlichen Leistungsrückgang, der aber strukturelle Ursachen hat – und keine individuelle 'Verblödung'. Zu den Ursachen gehören chronische Unterfinanzierung (Deutschland liegt unter dem OECD-Schnitt), akuter Lehrkräftemangel (35.000 fehlend), pandemiebedingte Lernrückstände und der stärkste Zusammenhang zwischen sozialer Herkunft und Bildungserfolg in der OECD. Die Lösung liegt nicht bei den Schüler:innen, sondern beim System: bessere Ausstattung, mehr Personal, gezielte Förderung Benachteiligter.</dd>
          <dt>Bildung ist Ländersache, da kann man nichts machen</dt>
          <dd>Das stimmt verfassungsrechtlich – aber es ist kein Naturgesetz. Das Kooperationsverbot von 2006 verhindert, dass der Bund direkt in Schulen investiert. Das Ergebnis: 16 verschiedene Lehrpläne, massive Qualitätsunterschiede zwischen den Bundesländern und ein 'Bildungsflickenteppich'. Mehrere Bundesländer fordern inzwischen selbst die Aufhebung dieses Verbots. Auch der DigitalPakt Schule zeigt, dass Bund-Länder-Kooperation in der Bildung möglich ist – er wurde trotz Kooperationsverbot realisiert. 'Ländersache' heißt nicht 'unveränderbar'.</dd>
          <dt>Wir geben genug Geld für Bildung aus</dt>
          <dd>Nominal klingt die Zahl von 198 Milliarden Euro nach viel. Aber gemessen am BIP liegt Deutschland mit 4,5 % deutlich unter dem OECD-Durchschnitt von 5,1 % – und weit hinter Finnland (6,5 %) oder Schweden (7,1 %). Die Konsequenzen sind sichtbar: marode Schulgebäude, fehlende Lehrkräfte, mangelnde digitale Ausstattung. Um auf skandinavisches Niveau zu kommen, müsste Deutschland jährlich rund 100 Milliarden Euro zusätzlich investieren. Gleichzeitig arbeiten nur 13,7 % der Kitas mit ausreichend Personal.</dd>
          <dt>Hauptschüler sind halt einfach nicht so schlau</dt>
          <dd>Das ist ein klassischer Zirkelschluss. PISA zeigt seit 2000 konsistent: In kaum einem Industrieland hängt der Bildungserfolg so stark vom Elternhaus ab wie in Deutschland. Kinder aus bildungsfernen Familien werden überproportional auf Hauptschulen verteilt – unabhängig von ihrem tatsächlichen Potenzial. Das ist kein Intelligenz-Problem, sondern ein Systemversagen: Zu frühe Selektion (meist schon nach Klasse 4), mangelnde individuelle Förderung und zu wenig Unterstützung für benachteiligte Kinder. Länder wie Finnland, die später selektieren und mehr individuell fördern, erreichen gleichzeitig höhere Leistungen und mehr Chancengleichheit.</dd>
          <dt>Inklusion schadet normalen Schülern</dt>
          <dd>Die umfassendste deutsche Studie zur Inklusion (INSIDE, 2016–2025, über 4.000 Schüler:innen an 246 Schulen) zeigt: Inklusion 'gelingt weder durchweg noch scheitert grundsätzlich'. Entscheidend sind die Rahmenbedingungen – insbesondere gute Kooperation zwischen Regel- und Sonderpädagogen sowie ausreichend Personal. Die Studie zeigt keine generellen Nachteile für Mitschüler:innen ohne Förderbedarf. Problematisch wird es erst, wenn Inklusion ohne zusätzliche Ressourcen umgesetzt wird. Das Problem ist also nicht die Inklusion an sich, sondern ihre unzureichende Ausstattung.</dd>
          <dt>Digitalisierung an Schulen bringt nichts, Kinder sollen lesen lernen</dt>
          <dd>Digitale Kompetenz und Lesen lernen sind kein Widerspruch – beides gehört zu den Grundkompetenzen des 21. Jahrhunderts. Der DigitalPakt Schule hat 6,5 Milliarden Euro in Infrastruktur investiert. Das Problem war nie 'ob', sondern 'wie': Tablets allein verbessern keinen Unterricht. Es braucht pädagogische Konzepte, geschulte Lehrkräfte und IT-Support. Aktuell müssen Lehrkräfte oft selbst die IT-Administration übernehmen. Eine wissenschaftliche Evaluation des DigitalPakts wird erst 2027 erwartet. Der DigitalPakt 2.0 (bis 2030) soll stärker auf Qualität statt nur auf Hardware setzen.</dd>
        </dl>
      </details>
      <h3><a href="https://fakten-stammtisch.de/thema/gesundheit">Deutsches Gesundheitssystem</a></h3>
      <p>Fakten zu Kosten, Zwei-Klassen-Medizin, Pflege &amp; Prävention</p>
      <ul>
        <li>~9.600 $ pro Kopf (OECD-Spitzengruppe)</li>
        <li>17,5 % Gesamt-Beitragssatz GKV (2026)</li>
        <li>8 Argumente</li>
      </ul>
      <details>
        <summary>Argumente (8)</summary>
        <dl>
          <dt>Wir haben das beste Gesundheitssystem der Welt</dt>
          <dd>Deutschland hat ein gutes Gesundheitssystem, aber 'das beste der Welt' ist es nachweislich nicht. Bei Pro-Kopf-Ausgaben liegt Deutschland mit ca. 9.600 USD in der OECD-Spitzengruppe – bekommt dafür aber nur mittelmäßige Ergebnisse: Kassenpatienten warten bei Fachärzten bis zu viermal länger als Privatpatienten, auf einen Therapieplatz wartet man im Schnitt 142 Tage, und bis 2034 fehlen mindestens 90.000 Pflegekräfte. Länder wie Dänemark oder die Niederlande erreichen mit deutlich weniger Krankenhausbetten und Ausgaben bessere Versorgungsqualität.</dd>
          <dt>Die Krankenkassenbeiträge sind viel zu hoch</dt>
          <dd>Der GKV-Gesamtbeitrag liegt 2026 bei 17,5 % des Bruttogehalts (paritätisch geteilt). Das klingt viel, aber dafür werden auch umfangreiche Leistungen finanziert – von Arztbesuchen über Krankenhausaufenthalte bis zu Medikamenten. Das eigentliche Problem ist nicht die Höhe, sondern die Effizienz: Deutschland leistet sich die zweithöchste Krankenhausdichte Europas bei nur 72 % Bettenauslastung, gibt nur 5 % für Prävention aus und hat massive Verwaltungskosten durch das duale System aus GKV und PKV. Die Frage ist weniger 'zu viel', sondern 'wofür'.</dd>
          <dt>Jeder bekommt in Deutschland die medizinische Versorgung, die er braucht</dt>
          <dd>Formal hat jeder Zugang zum Gesundheitssystem, aber in der Praxis gibt es gravierende Versorgungslücken. Kassenpatienten warten beim Lungenfacharzt im Schnitt 129 Tage – Privatpatienten nur 35. 17,8 Millionen Menschen leiden jährlich unter psychischen Erkrankungen, aber ein Therapieplatz lässt durchschnittlich 142 Tage auf sich warten. Auf dem Land fehlen Haus- und Fachärzte. Und die Qualität der Pflege ist durch chronischen Personalmangel bedroht. Die Versorgung hängt in Deutschland stark davon ab, wo man lebt, wie man versichert ist und welche Krankheit man hat.</dd>
          <dt>Ausländer belasten unser Gesundheitssystem</dt>
          <dd>Asylbewerber erhalten in den ersten 36 Monaten nur eine stark eingeschränkte medizinische Versorgung – beschränkt auf akute Erkrankungen, chronische Krankheiten, Impfungen und Schwangerschaft. Die Pro-Kopf-Ausgaben für Geflüchtete liegen bei 180–200 Euro jährlich, der GKV-Durchschnitt bei rund 3.000 Euro pro Versichertem. Zudem nutzen Migranten Vorsorgeuntersuchungen und Spezialleistungen nachweislich seltener als Nicht-Migranten. Das GKV-Finanzierungsproblem (Lücke von ~51 Mrd. €) hat strukturelle Ursachen: alternde Gesellschaft, teure Medizintechnik und Überversorgung bei Krankenhäusern.</dd>
          <dt>Psychische Krankheiten sind nur Einbildung / Modeerscheinung</dt>
          <dd>Psychische Erkrankungen sind medizinisch genauso real wie körperliche. Etwa 17,8 Millionen Erwachsene in Deutschland sind jährlich betroffen – jeder Vierte. Im ersten Halbjahr 2025 stiegen die Fallzahlen um weitere 3,4 %. Depressionen, Angststörungen und Burnout sind inzwischen eine der häufigsten Ursachen für Arbeitsunfähigkeit und Frühverrentung. Die scheinbare 'Zunahme' erklärt sich auch durch bessere Diagnostik und geringere Stigmatisierung – nicht dadurch, dass sich mehr Menschen etwas einbilden. Der eigentliche Skandal: Von 48.000 approbierten Therapeuten dürfen nur 32.500 mit Krankenkassen abrechnen.</dd>
          <dt>Homöopathie/Alternativmedizin sollte von der Kasse bezahlt werden</dt>
          <dd>Für homöopathische Mittel gibt es nach aktuellem wissenschaftlichem Konsens keine belastbaren Belege für eine Wirkung über den Placeboeffekt hinaus. Bei hochpotenzierten Mitteln ist oft kein einziges Molekül der Ausgangssubstanz mehr nachweisbar. Systematische Reviews (u.a. Shang et al.) zeigen: Die positiven Studien sind überwiegend klein, methodisch schwach und nicht reproduzierbar. Gleichzeitig fehlen 1.600 bis 7.000 Kassensitze für Psychotherapeuten und die Wartezeit auf einen Therapieplatz beträgt 142 Tage. Kassengelder sollten evidenzbasiert eingesetzt werden – dort, wo nachweislich Wirkung erzielt wird.</dd>
          <dt>Es gibt zu viele Krankenhäuser</dt>
          <dd>Da ist tatsächlich etwas dran: Mit 7,6 Betten pro 10.000 Einwohner hat Deutschland die zweithöchste Krankenhausdichte in Europa – bei nur 72 % Auslastung. Zum Vergleich: Dänemark und die Niederlande kommen mit je 2,4 Betten aus. Seit 2000 hat Deutschland seine Bettenzahl nur um 13 % reduziert, während Finnland und Dänemark um über 40 % reduzierten. Aber: 'Weniger' heißt nicht automatisch 'besser'. Es braucht Spezialisierung und Vernetzung, nicht blindes Schließen. Besonders in ländlichen Regionen muss die Erreichbarkeit gewährleistet bleiben. Die Krankenhausreform versucht genau diesen Spagat – wurde aber 2025/26 bereits abgeschwächt.</dd>
          <dt>Die Pharmaindustrie macht uns absichtlich krank</dt>
          <dd>Diese Verschwörungstheorie hält keiner Prüfung stand. Medikamente durchlaufen strenge Zulassungsverfahren (EMA, BfArM) mit klinischen Studien in mehreren Phasen. Die Pharmabranche verdient an Behandlungen – aber das liegt am Geschäftsmodell, nicht an absichtlicher Schadenszufügung. Berechtigte Kritik gibt es an hohen Medikamentenpreisen, aggressivem Marketing und mangelnder Transparenz bei Studien. Die Lösung ist aber mehr Regulierung und unabhängige Forschung, nicht das Ablehnen evidenzbasierter Medizin. Tatsächlich zeigt Deutschlands System ein anderes Problem: Zu wenig Investition in Prävention (nur 5 % der Ausgaben) und zu viel Fokus auf Behandlung.</dd>
        </dl>
      </details>
